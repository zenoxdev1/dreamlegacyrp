<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Emergency</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 16px;
        height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .emergency-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .emergency-btn {
        padding: 20px;
        border-radius: 12px;
        border: 2px solid;
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        color: #fff;
        text-align: center;
        transition: all 0.15s;
      }
      .emergency-btn:active {
        transform: scale(0.97);
        opacity: 0.8;
      }
      .emergency-btn.police {
        background: #1e3a5f;
        border-color: #3b82f6;
        color: #93c5fd;
      }
      .emergency-btn.ems {
        background: #5f1e1e;
        border-color: #ef4444;
        color: #fca5a5;
      }
      .emergency-btn.test {
        background: rgba(255, 255, 255, 0.03);
        border-color: var(--card-border);
        color: var(--muted);
        font-size: 14px;
        padding: 12px;
      }
      .emergency-status {
        padding: 12px;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--card-border);
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        min-height: 40px;
      }
      .emergency-status.success {
        border-color: var(--mint);
        color: var(--mint);
      }
      .emergency-status.error {
        border-color: var(--red);
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <span class="ah-title">&#128680; Emergency</span>
    </div>
    <div class="app-body">
      <div style="margin-bottom: 14px">
        <label
          style="
            display: block;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
          "
          >Your Location</label
        >
        <select
          id="location-select"
          style="
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid rgba(124, 58, 237, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
          "
        >
          <option value="">Select your location...</option>
          <option>Rockford Hills</option>
          <option>Del Perro</option>
          <option>Vespucci Beach</option>
          <option>Vespucci Canals</option>
          <option>Little Seoul</option>
          <option>La Puerta</option>
          <option>Downtown</option>
          <option>Pillbox Hill</option>
          <option>Strawberry</option>
          <option>La Mesa</option>
          <option>Davis</option>
          <option>Chamberlain Hills</option>
          <option>Rancho</option>
          <option>Cypress Flats</option>
          <option>Elysian Island</option>
          <option>Mission Row</option>
          <option>Textile City</option>
          <option>Alta</option>
          <option>Hawick</option>
          <option>Burton</option>
          <option>West Vinewood</option>
          <option>East Vinewood</option>
          <option>Vinewood</option>
          <option>Mirror Park</option>
          <option>Richman</option>
          <option>Morningwood</option>
          <option>Banning</option>
          <option>Maze Bank Arena</option>
          <option>Murietta Heights</option>
          <option>Los Santos International Airport</option>
          <option>Terminal</option>
        </select>
      </div>
      <div class="emergency-grid">
        <button class="emergency-btn police" onclick="callPolice()">
          &#128110; Call Police
        </button>
        <button class="emergency-btn ems" onclick="callEMS()">
          &#128657; Call EMS
        </button>
        <button class="emergency-btn test" onclick="testWebhook()">
          &#9881; Test Webhook
        </button>
      </div>
      <div class="emergency-status" id="status-msg">Ready</div>
    </div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      /* Los webhooks ahora viven en el servidor (Cloudflare), no aqui --
   asi nadie puede sacarlos con las herramientas de desarrollador
   del navegador y spamear el Discord desde fuera del juego. */ var statusEl =
        document.getElementById("status-msg");
      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "emergency-status";
        if (type) statusEl.classList.add(type);
      }
      function getLocation() {
        var sel = document.getElementById("location-select");
        var val = sel ? sel.value : "";
        return val || "Not specified";
      }
      function sendAlert(type, title, color) {
        var ud = bridge.getUD();
        var caller = ud ? ud.displayName || ud.name || "Unknown" : "Unknown";
        var phone = ud ? ud.phoneNumber || "Unknown" : "Unknown";
        var location = getLocation();

        setStatus("Sending alert...", "");
        bridge
          .sendEmergencyAlert(type, title, color, caller, phone, location)
          .then(function () {
            setStatus("Alert sent successfully!", "success");
            bridge.notif("Emergency", "Alert has been dispatched.");
          })
          .catch(function (err) {
            setStatus(err.message || "Could not send the alert.", "error");
            bridge.notif("Error", err.message || "Could not send the alert.");
          });
      }

      function callPolice() {
        sendAlert("police", "\uD83D\uDEA8 Police Dispatch", 0x3b82f6);
      }
      function callEMS() {
        sendAlert("ems", "\uD83D\uDE91 EMS Dispatch", 0xef4444);
      }
      function testWebhook() {
        setStatus("Testing...", "");
        bridge
          .sendEmergencyAlert(
            "test",
            "\uD83D\uDD27 Test Webhook",
            0x64748b,
            "System",
            "-",
            "Test",
          )
          .then(function () {
            setStatus("Test alert sent successfully!", "success");
            bridge.notif("Success", "Test alert sent.");
          })
          .catch(function (err) {
            setStatus(err.message || "Test request failed.", "error");
            bridge.notif("Error", err.message || "Test request failed.");
          });
      }
    </script>
  </body>
</html>
