<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Emergency</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 16px;
        height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .emergency-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .emergency-btn {
        padding: 20px;
        border-radius: 12px;
        border: 2px solid;
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        color: #fff;
        text-align: center;
        transition: all 0.15s;
      }
      .emergency-btn:active {
        transform: scale(0.97);
        opacity: 0.8;
      }
      .emergency-btn.police {
        background: #1e3a5f;
        border-color: #3b82f6;
        color: #93c5fd;
      }
      .emergency-btn.ems {
        background: #5f1e1e;
        border-color: #ef4444;
        color: #fca5a5;
      }
      .emergency-btn.test {
        background: rgba(255, 255, 255, 0.03);
        border-color: var(--card-border);
        color: var(--muted);
        font-size: 14px;
        padding: 12px;
      }
      .emergency-status {
        padding: 12px;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--card-border);
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        min-height: 40px;
      }
      .emergency-status.success {
        border-color: var(--mint);
        color: var(--mint);
      }
      .emergency-status.error {
        border-color: var(--red);
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <span class="ah-title">&#128680; Emergency</span>
    </div>
    <div class="app-body">
      <div class="emergency-grid">
        <button class="emergency-btn police" onclick="callPolice()">
          &#128110; Call Police
        </button>
        <button class="emergency-btn ems" onclick="callEMS()">
          &#128657; Call EMS
        </button>
        <button class="emergency-btn test" onclick="testWebhook()">
          &#9881; Test Webhook
        </button>
      </div>
      <div class="emergency-status" id="status-msg">Ready</div>
    </div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      /* --- Configure your Discord webhook URLs below --- */ var POLICE_WEBHOOK =
        "";
      var EMS_WEBHOOK = "";
      /* ------------------------------------------------- */ var statusEl =
        document.getElementById("status-msg");
      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "emergency-status";
        if (type) statusEl.classList.add(type);
      }
      function getLocation() {
        var ud = bridge.getUD();
        if (ud && ud.location) return ud.location;
        return "Unknown Location";
      }
      function sendWebhook(webhookUrl, title, color) {
        if (!webhookUrl) {
          setStatus(
            "Webhook URL not configured. Set POLICE_WEBHOOK or EMS_WEBHOOK.",
            "error",
          );
          bridge.notif("Error", "Webhook URL not configured.");
          return;
        }
        var ud = bridge.getUD();
        var caller = ud ? ud.displayName || ud.name || "Unknown" : "Unknown";
        var phone = ud ? ud.phoneNumber || "Unknown" : "Unknown";
        var location = getLocation();
        var now = new Date();
        var timestamp = now.toLocaleString();
        var embed = {
          title: title,
          color: color,
          fields: [
            { name: "Caller", value: bridge.esc(caller), inline: true },
            { name: "Phone", value: bridge.esc(phone), inline: true },
            { name: "Location", value: bridge.esc(location), inline: true },
            { name: "Time", value: bridge.esc(timestamp), inline: false },
          ],
          timestamp: now.toISOString(),
        };
        setStatus("Sending alert...", "");
        fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ embeds: [embed] }),
        })
          .then(function (res) {
            if (res.ok) {
              setStatus("Alert sent successfully!", "success");
              bridge.notif("Emergency", "Alert has been dispatched.");
            } else {
              setStatus("Webhook responded with " + res.status, "error");
              bridge.notif("Error", "Webhook responded with " + res.status);
            }
          })
          .catch(function (err) {
            setStatus("Request failed: " + err.message, "error");
            bridge.notif("Error", "Request failed: " + err.message);
          });
      }
      function callPolice() {
        sendWebhook(POLICE_WEBHOOK, "🚨 Police Dispatch", 0x3b82f6);
      }
      function callEMS() {
        sendWebhook(EMS_WEBHOOK, "🚑 EMS Dispatch", 0xef4444);
      }
      function testWebhook() {
        var testUrl = POLICE_WEBHOOK || EMS_WEBHOOK;
        if (!testUrl) {
          setStatus(
            "No webhook URLs configured. Set POLICE_WEBHOOK or EMS_WEBHOOK first.",
            "error",
          );
          bridge.notif("Error", "No webhook URLs configured.");
          return;
        }
        var embed = {
          title: "🔧 Test Webhook",
          color: 0x64748b,
          description: "This is a test message from the Emergency app.",
          fields: [
            { name: "Status", value: "Operational", inline: true },
            { name: "Time", value: new Date().toLocaleString(), inline: true },
          ],
          timestamp: new Date().toISOString(),
        };
        setStatus("Testing webhook...", "");
        fetch(testUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ embeds: [embed] }),
        })
          .then(function (res) {
            if (res.ok) {
              setStatus("Test webhook sent successfully!", "success");
              bridge.notif("Success", "Test webhook sent.");
            } else {
              setStatus("Test webhook responded with " + res.status, "error");
              bridge.notif(
                "Error",
                "Test webhook responded with " + res.status,
              );
            }
          })
          .catch(function (err) {
            setStatus("Test request failed: " + err.message, "error");
            bridge.notif("Error", "Test request failed: " + err.message);
          });
      }
    </script>
  </body>
</html>
