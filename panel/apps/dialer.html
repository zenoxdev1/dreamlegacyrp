<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Phone</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
      }
      html {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
        flex-shrink: 0;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-header .ah-add {
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        border: none;
        color: #fff;
        font-size: 18px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tab-panels {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      .tab-panel {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        padding: 10px 12px;
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      .bottom-nav {
        display: flex;
        border-top: 1px solid var(--card-border);
        background: var(--card);
        flex-shrink: 0;
      }
      .bn-btn {
        flex: 1;
        background: none;
        border: none;
        color: var(--dim);
        padding: 10px 4px 8px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .bn-btn .bn-icon {
        font-size: 18px;
      }
      .bn-btn.active {
        color: var(--mint);
      }

      .dialer-display {
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        padding: 14px 0 6px;
        letter-spacing: 2px;
        font-family: "Rajdhani", sans-serif;
        min-height: 40px;
        word-break: break-all;
      }
      .dialer-pad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 220px;
        margin: 4px auto 0;
      }
      .dialer-key {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 20px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        transition: background 0.1s;
      }
      .dialer-key:active {
        background: rgba(124, 58, 237, 0.3);
        transform: scale(0.92);
      }
      .dialer-key .dk-sub {
        display: block;
        font-size: 8px;
        font-weight: 400;
        color: var(--dim);
        line-height: 1;
        margin-top: 1px;
      }
      .dialer-call-wrap {
        display: flex;
        justify-content: center;
        margin: 14px 0 6px;
        gap: 20px;
        align-items: center;
      }
      .dialer-call {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: none;
        background: var(--mint);
        color: #000;
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s;
      }
      .dialer-call:active {
        transform: scale(0.9);
      }
      .dialer-clear {
        background: none;
        border: none;
        color: var(--dim);
        font-size: 14px;
        cursor: pointer;
        padding: 8px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
      }
      .dialer-clear:active {
        color: var(--red);
      }
      .call-status {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
        margin-top: 2px;
      }

      .contact-entry,
      .dialer-contact {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .contact-avatar,
      .dc-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .contact-info,
      .dc-info {
        flex: 1;
        min-width: 0;
      }
      .contact-name,
      .dc-name {
        font-size: 14px;
        font-weight: 500;
      }
      .contact-num,
      .dc-num {
        font-size: 11px;
        color: var(--dim);
      }
      .contact-badge {
        font-size: 9px;
        background: var(--red);
        color: #fff;
        padding: 1px 6px;
        border-radius: 4px;
        margin-left: 6px;
        vertical-align: middle;
      }
      .contact-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .contact-actions button {
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        font-size: 16px;
        padding: 4px 6px;
        border-radius: 6px;
      }
      .contact-actions button:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .contact-actions .ca-call {
        color: var(--mint);
      }
      .contact-actions .ca-msg {
        color: var(--purple);
      }
      .contact-actions .ca-del:hover {
        color: var(--red);
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 13px;
      }
      .empty-state .empty-icon {
        font-size: 40px;
        margin-bottom: 8px;
        opacity: 0.4;
      }
      .call-outgoing {
        color: var(--mint);
      }
      .call-incoming {
        color: var(--cyan);
      }
      .call-missed,
      .call-declined {
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <div class="tab-panels">
      <div class="tab-panel active" id="panel-keypad">
        <div class="dialer-display" id="dialer-display">&nbsp;</div>
        <div class="dialer-pad" id="dialer-pad"></div>
        <div class="dialer-call-wrap">
          <button class="dialer-call" onclick="doCall()">&#128222;</button>
          <button class="dialer-clear" onclick="clearNumber()">Clear</button>
        </div>
        <div class="call-status" id="call-status"></div>
      </div>

      <div class="tab-panel" id="panel-contacts">
        <div
          style="display: flex; justify-content: flex-end; margin-bottom: 6px"
        >
          <button class="ah-add" onclick="addContact()">+</button>
        </div>
        <div id="contact-list"></div>
      </div>

      <div class="tab-panel" id="panel-recents">
        <div id="recents-list"></div>
      </div>
    </div>

    <div class="bottom-nav">
      <button
        class="bn-btn active"
        id="bn-keypad"
        onclick="switchTab('keypad')"
      >
        <span class="bn-icon">&#8942;&#8942;&#8942;</span>Keypad
      </button>
      <button class="bn-btn" id="bn-contacts" onclick="switchTab('contacts')">
        <span class="bn-icon">&#128100;</span>Contacts
      </button>
      <button class="bn-btn" id="bn-recents" onclick="switchTab('recents')">
        <span class="bn-icon">&#8635;</span>Recents
      </button>
    </div>

    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      var dialed = "";
      var activeTab = "keypad";
      var currentCallId = null;
      var outcomePollTimer = null;

      function switchTab(tab) {
        activeTab = tab;
        ["keypad", "contacts", "recents"].forEach(function (t) {
          document
            .getElementById("panel-" + t)
            .classList.toggle("active", t === tab);
          document
            .getElementById("bn-" + t)
            .classList.toggle("active", t === tab);
        });
        if (tab === "contacts") renderContacts();
        if (tab === "recents") renderRecents();
      }

      function renderKeypad() {
        var keys = [
          ["1", ""],
          ["2", "ABC"],
          ["3", "DEF"],
          ["4", "GHI"],
          ["5", "JKL"],
          ["6", "MNO"],
          ["7", "PQRS"],
          ["8", "TUV"],
          ["9", "WXYZ"],
          ["*", ""],
          ["0", "+"],
          ["#", ""],
        ];
        var pad = document.getElementById("dialer-pad");
        pad.innerHTML = keys
          .map(function (k) {
            return (
              '<button class="dialer-key" onclick="pressKey(\'' +
              k[0] +
              "')\">" +
              k[0] +
              (k[1] ? '<span class="dk-sub">' + k[1] + "</span>" : "") +
              "</button>"
            );
          })
          .join("");
      }

      function pressKey(k) {
        if (dialed.length >= 20) return;
        dialed += k;
        updateDisplay();
      }

      function clearNumber() {
        dialed = dialed.slice(0, -1);
        updateDisplay();
      }

      function updateDisplay() {
        document.getElementById("dialer-display").textContent =
          dialed || "\u00A0";
      }

      function setCallStatus(text, cls) {
        var el = document.getElementById("call-status");
        el.textContent = text || "";
        el.style.color =
          cls === "ok"
            ? "var(--mint)"
            : cls === "bad"
              ? "var(--red)"
              : "var(--muted)";
      }

      function doCall() {
        if (!dialed) {
          bridge.notif("Phone", "Enter a number first.");
          return;
        }
        setCallStatus("Calling " + dialed + "...");
        bridge
          .placeCall(dialed)
          .then(function (res) {
            currentCallId = res.callId || null;
            if (!currentCallId) {
              setCallStatus("Call sent.", "ok");
              return;
            }
            pollCallOutcome();
          })
          .catch(function (err) {
            setCallStatus(err.message || "Could not place the call.", "bad");
          });
      }

      function pollCallOutcome() {
        if (outcomePollTimer) clearInterval(outcomePollTimer);
        var attempts = 0;
        outcomePollTimer = setInterval(function () {
          attempts++;
          if (!currentCallId || attempts > 15) {
            clearInterval(outcomePollTimer);
            return;
          }
          bridge
            .getCallOutcome(currentCallId)
            .then(function (status) {
              if (status === "answered") {
                setCallStatus("Connected \u2014 talk over voice chat.", "ok");
                clearInterval(outcomePollTimer);
              } else if (status === "declined") {
                setCallStatus("Call declined.", "bad");
                clearInterval(outcomePollTimer);
              } else if (status === "missed") {
                setCallStatus("No answer.", "bad");
                clearInterval(outcomePollTimer);
              } else {
                setCallStatus("Ringing...");
              }
            })
            .catch(function () {
              clearInterval(outcomePollTimer);
            });
        }, 2000);
      }

      var gradients = [
        "linear-gradient(135deg,#3b82f6,#1d4ed8)",
        "linear-gradient(135deg,#22c55e,#16a34a)",
        "linear-gradient(135deg,#8b5cf6,#6d28d9)",
        "linear-gradient(135deg,#f59e0b,#d97706)",
        "linear-gradient(135deg,#ec4899,#db2777)",
        "linear-gradient(135deg,#14b8a6,#0d9488)",
        "linear-gradient(135deg,#f97316,#ea580c)",
        "linear-gradient(135deg,#a855f7,#7e22ce)",
      ];

      function renderContacts() {
        var ud = bridge.getUD();
        var list = document.getElementById("contact-list");
        if (!ud || !ud.contacts || ud.contacts.length === 0) {
          list.innerHTML =
            '<div class="empty-state"><div class="empty-icon">&#128100;</div>No contacts yet.<br>Tap + to add one.</div>';
          return;
        }
        var html = "";
        for (var i = 0; i < ud.contacts.length; i++) {
          var c = ud.contacts[i];
          var letter = c.name ? c.name.charAt(0).toUpperCase() : "?";
          var grad = gradients[i % gradients.length];
          var badge = c.emergency
            ? ' <span class="contact-badge">EMERGENCY</span>'
            : "";
          html +=
            '<div class="contact-entry">' +
            '<div class="contact-avatar" style="background:' +
            grad +
            ';">' +
            bridge.esc(letter) +
            "</div>" +
            '<div class="contact-info"><div class="contact-name">' +
            bridge.esc(c.name) +
            badge +
            '</div><div class="contact-num">' +
            bridge.esc(c.number) +
            "</div></div>" +
            '<div class="contact-actions">' +
            '<button class="ca-call" onclick="callContact(' +
            i +
            ')" title="Call">&#128222;</button>' +
            '<button class="ca-msg" onclick="msgContact(' +
            i +
            ')" title="Message">&#9993;</button>' +
            '<button class="ca-del" onclick="delContact(' +
            i +
            ')" title="Delete">&#10005;</button>' +
            "</div></div>";
        }
        list.innerHTML = html;
      }

      function addContact() {
        bridge.showCustomModal(
          "Add Contact",
          '<div class="form-field"><label>Name</label><input type="text" id="cm-name" placeholder="Contact name" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(124,58,237,0.15);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;"></div>' +
            '<div class="form-field"><label>Number</label><input type="text" id="cm-number" placeholder="e.g. 555-0101" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(124,58,237,0.15);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;"></div>' +
            '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;"><input type="checkbox" id="cm-emergency"><label style="color:#64748b;font-size:12px;">Emergency contact</label></div>',
          [
            { label: "Cancel", class: "btn", action: function () {} },
            {
              label: "Save",
              class: "btn primary",
              action: function () {
                var name = bridge.el("cm-name").value.trim();
                var number = bridge.el("cm-number").value.trim();
                if (!name || !number) {
                  bridge.notif("Error", "Name and number required.");
                  return;
                }
                var emergency = bridge.el("cm-emergency").checked;
                var ud = bridge.getUD();
                if (!ud.contacts) ud.contacts = [];
                ud.contacts.push({
                  name: name,
                  number: number,
                  emergency: emergency,
                });
                bridge.saveData();
                renderContacts();
              },
            },
          ],
        );
      }

      function callContact(idx) {
        var ud = bridge.getUD();
        var c = ud.contacts[idx];
        if (!c) return;
        dialed = c.number;
        switchTab("keypad");
        updateDisplay();
        doCall();
      }

      function msgContact(idx) {
        bridge.openApp("messages");
      }

      function delContact(idx) {
        bridge.showCustomModal(
          "Delete Contact",
          '<p style="color:#64748b;font-size:13px;">Remove this contact?</p>',
          [
            { label: "Cancel", class: "btn", action: function () {} },
            {
              label: "Delete",
              class: "btn",
              action: function () {
                var ud = bridge.getUD();
                ud.contacts.splice(idx, 1);
                bridge.saveData();
                renderContacts();
              },
            },
          ],
        );
      }

      function timeAgoCall(iso) {
        if (!iso) return "";
        var diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return "just now";
        if (diff < 3600) return Math.floor(diff / 60) + "m ago";
        if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
        return Math.floor(diff / 86400) + "d ago";
      }

      var STATUS_LABEL = {
        answered: "Answered",
        declined: "Declined",
        missed: "No answer",
        ringing: "Ringing...",
      };

      function renderRecents() {
        var list = document.getElementById("recents-list");
        if (!bridge.getRecentCalls) {
          list.innerHTML = "";
          return;
        }
        bridge
          .getRecentCalls()
          .then(function (calls) {
            if (!calls || calls.length === 0) {
              list.innerHTML =
                '<div class="empty-state"><div class="empty-icon">&#8635;</div>No recent calls.</div>';
              return;
            }
            var html = "";
            for (var i = 0; i < calls.length; i++) {
              var c = calls[i];
              var otherNum = c.outgoing ? c.toNumber : c.fromNumber;
              var arrow = c.outgoing ? "&#8599;" : "&#8601;";
              var statusClass =
                c.status === "missed" || c.status === "declined"
                  ? "call-missed"
                  : c.outgoing
                    ? "call-outgoing"
                    : "call-incoming";
              var letter = otherNum ? otherNum.charAt(0) : "?";
              html +=
                '<div class="dialer-contact" onclick="callBack(\'' +
                bridge.esc(otherNum) +
                "')\">" +
                '<div class="dc-avatar" style="background:' +
                gradients[i % gradients.length] +
                ';">' +
                bridge.esc(letter) +
                "</div>" +
                '<div class="dc-info"><div class="dc-name ' +
                statusClass +
                '">' +
                arrow +
                " " +
                bridge.esc(otherNum) +
                (c.fromRpName && !c.outgoing
                  ? " (" + bridge.esc(c.fromRpName) + ")"
                  : "") +
                "</div>" +
                '<div class="dc-num">' +
                (STATUS_LABEL[c.status] || "") +
                " &middot; " +
                timeAgoCall(c.createdAt) +
                "</div></div>" +
                "</div>";
            }
            list.innerHTML = html;
          })
          .catch(function () {
            list.innerHTML = "";
          });
      }

      function callBack(number) {
        dialed = number;
        switchTab("keypad");
        updateDisplay();
      }

      renderKeypad();
    </script>
  </body>
</html>
