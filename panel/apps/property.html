<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Properties</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
        --green: #22c55e;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 8px 12px;
        height: calc(100vh - 40px);
      }
      .section-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--cyan);
        margin: 16px 0 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .property-card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 10px;
      }
      .p-name {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #fff;
      }
      .p-loc {
        font-size: 12px;
        color: var(--muted);
        margin: 2px 0 8px;
      }
      .p-price {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 14px;
        color: var(--mint);
      }
      .p-status.owned {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 12px;
        color: var(--green);
        background: rgba(34, 197, 94, 0.1);
        padding: 2px 10px;
        border-radius: 20px;
        display: inline-block;
      }
      .property-actions {
        margin-top: 10px;
      }
      .btn-buy {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font-size: 13px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.1s;
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        color: #fff;
      }
      .btn-buy:hover {
        opacity: 0.9;
      }
      .btn-buy:active {
        transform: scale(0.96);
      }
      .empty-state {
        text-align: center;
        padding: 32px 0;
        color: var(--muted);
        font-size: 13px;
      }
      .gov-section {
        margin-top: 18px;
        padding: 14px;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 12px;
      }
      .gs-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: var(--cyan);
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <span class="ah-title">&#127968; Properties</span>
    </div>
    <div class="app-body">
      <div id="owned-section">
        <div class="section-title">Your Properties</div>
        <div id="owned-list"></div>
      </div>
      <div id="available-section">
        <div class="section-title">Available Properties</div>
        <div id="available-list"></div>
      </div>
    </div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      var ALL_PROPERTIES = [
        {
          name: "Beecher's Hope Cabin",
          type: "Cabin",
          loc: "Great Plains",
          price: 25000,
        },
        {
          name: "Del Perro Apt 4",
          type: "Apartment",
          loc: "Del Perro",
          price: 75000,
        },
        {
          name: "Vinewood Hills Villa",
          type: "Villa",
          loc: "Vinewood Hills",
          price: 150000,
        },
        {
          name: "Paleto Bay House",
          type: "House",
          loc: "Paleto Bay",
          price: 45000,
        },
        {
          name: "Sandy Shores Trailer",
          type: "Trailer",
          loc: "Sandy Shores",
          price: 12000,
        },
        {
          name: "Rockford Hills Mansion",
          type: "Mansion",
          loc: "Rockford Hills",
          price: 350000,
        },
      ];
      function render() {
        var ud = bridge.getUD();
        if (!ud) return;
        var owned = ud.properties || [];
        var ownedList = document.getElementById("owned-list");
        var availList = document.getElementById("available-list");
        ownedList.innerHTML = "";
        availList.innerHTML = "";
        if (owned.length === 0) {
          ownedList.innerHTML =
            '<div class="empty-state">You don\'t own any properties yet.</div>';
        } else {
          for (var i = 0; i < owned.length; i++) {
            var p = owned[i];
            var card = document.createElement("div");
            card.className = "property-card";
            card.innerHTML =
              '<div class="p-name">' +
              bridge.esc(p.name) +
              '</div><div class="p-loc">' +
              bridge.esc(p.loc || p.type || "") +
              '</div><div class="p-price">' +
              (p.price !== undefined ? "$" + formatNum(p.price) : "") +
              '</div><div style="margin-top:6px;"><span class="p-status owned">&#10003; Owned</span></div>';
            ownedList.appendChild(card);
          }
        }
        var ownedNames = {};
        for (var i = 0; i < owned.length; i++) {
          ownedNames[owned[i].name] = true;
        }
        var shown = 0;
        for (var i = 0; i < ALL_PROPERTIES.length; i++) {
          var p = ALL_PROPERTIES[i];
          if (ownedNames[p.name]) continue;
          shown++;
          var card = document.createElement("div");
          card.className = "property-card";
          card.innerHTML =
            '<div class="p-name">' +
            bridge.esc(p.name) +
            '</div><div class="p-loc">' +
            bridge.esc(p.loc) +
            " &middot; " +
            bridge.esc(p.type) +
            '</div><div class="p-price">$' +
            formatNum(p.price) +
            '</div><div class="property-actions"><button class="btn-buy" onclick="buyProperty(' +
            i +
            ')">Purchase</button></div>';
          availList.appendChild(card);
        }
        if (shown === 0) {
          availList.innerHTML =
            '<div class="empty-state">All properties owned.</div>';
        }
      }
      function buyProperty(index) {
        var p = ALL_PROPERTIES[index];
        var ud = bridge.getUD();
        if (!ud) return;
        var bank = ud.bank || 0;
        if (bank < p.price) {
          bridge.notif(
            "Insufficient Funds",
            "You need $" + formatNum(p.price) + " to buy this property.",
          );
          return;
        }
        ud.bank = bank - p.price;
        if (!ud.properties) ud.properties = [];
        ud.properties.push({
          name: p.name,
          type: p.type,
          loc: p.loc,
          price: p.price,
        });
        bridge.saveData();
        bridge.updateHUD();
        bridge.notif("Property Purchased", "You now own " + p.name + ".");
        render();
      }
      function formatNum(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }
      render();
    </script>
  </body>
</html>
