<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Vehicles</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
        --green: #22c55e;
        --yellow: #eab308;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 8px 12px;
        height: calc(100vh - 40px);
      }
      .vehicle-card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .vehicle-card .v-icon {
        font-size: 32px;
        width: 44px;
        text-align: center;
        flex-shrink: 0;
      }
      .vehicle-card .v-info {
        flex: 1;
        min-width: 0;
      }
      .vehicle-card .v-name {
        font-size: 14px;
        font-weight: 600;
      }
      .vehicle-card .v-plate {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 13px;
        color: var(--cyan);
        letter-spacing: 1px;
        margin-top: 1px;
      }
      .vehicle-card .v-detail {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .vehicle-card .v-badge {
        display: inline-block;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 6px;
        margin-left: 6px;
        vertical-align: middle;
      }
      .vehicle-card .v-badge.insured {
        background: rgba(6, 182, 212, 0.15);
        color: var(--cyan);
      }
      .vehicle-card .v-badge.uninsured {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .empty-state {
        text-align: center;
        padding: 50px 20px;
        color: var(--muted);
        font-size: 13px;
      }
      .empty-state .empty-icon {
        font-size: 44px;
        margin-bottom: 10px;
        opacity: 0.4;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="app-header">
      <span class="ah-title">&#128663; Vehicles</span>
    </div>
    <div class="app-body" id="app-body"></div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      var VEHICLE_ICONS = {
        car: "\u{1F697}",
        truck: "\u{1F69A}",
        suv: "\u{1F699}",
        sports: "\u{1F3CE}\uFE0F",
        motorcycle: "\u{1F3CD}\uFE0F",
        bike: "\u{1F6B2}",
        boat: "\u{26F5}",
        plane: "\u{2708}\uFE0F",
        helicopter: "\u{1F681}",
        van: "\u{1F690}",
        sedan: "\u{1F697}",
        coupe: "\u{1F3CE}\uFE0F",
        default: "\u{1F697}",
      };
      function render() {
        var ud = bridge.getUD();
        var body = document.getElementById("app-body");
        var vehicles = ud && ud.vehicles ? ud.vehicles : [];
        if (vehicles.length === 0) {
          body.innerHTML =
            '<div class="empty-state"><span class="empty-icon">&#128663;</span>No vehicles registered.</div>';
          return;
        }
        var html = "";
        for (var i = 0; i < vehicles.length; i++) {
          var v = vehicles[i];
          var icon = getVehicleIcon(v.type || v.class || "default");
          var insured = v.insured === true || v.insured === "true";
          var badge = insured
            ? '<span class="v-badge insured">Insured</span>'
            : '<span class="v-badge uninsured">Uninsured</span>';
          var color = v.color ? v.color : "N/A";
          var model = v.model || v.name || "Vehicle";
          html +=
            '<div class="vehicle-card">' +
            '<div class="v-icon">' +
            icon +
            "</div>" +
            '<div class="v-info">' +
            '<div class="v-name">' +
            bridge.esc(model) +
            badge +
            "</div>" +
            '<div class="v-plate">' +
            bridge.esc(v.plate || "NO PLATE") +
            "</div>" +
            '<div class="v-detail">' +
            bridge.esc(color) +
            "</div>" +
            "</div>" +
            "</div>";
        }
        body.innerHTML = html;
      }
      function getVehicleIcon(type) {
        if (!type) return VEHICLE_ICONS.default;
        var t = type.toLowerCase();
        return VEHICLE_ICONS[t] || VEHICLE_ICONS.default;
      }
      render();
    </script>
  </body>
</html>
