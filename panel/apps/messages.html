<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Messages</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
      }
      .app-header .ah-back {
        background: none;
        border: none;
        color: var(--purple);
        font-size: 18px;
        cursor: pointer;
        padding: 2px 4px;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 8px 12px;
        height: calc(100vh - 40px);
      }
      .msg-contact {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        cursor: pointer;
      }
      .msg-contact:active {
        opacity: 0.6;
      }
      .mc-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--purple), var(--cyan));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .mc-info {
        flex: 1;
        min-width: 0;
      }
      .mc-name {
        font-size: 14px;
        font-weight: 500;
      }
      .mc-num {
        font-size: 11px;
        color: var(--dim);
      }
      .mc-preview {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .msg-thread {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
      }
      .msg-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 4px 0;
      }
      .msg-bubble {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 12px;
        line-height: 1.4;
      }
      .msg-bubble.incoming {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.06);
        border-bottom-left-radius: 4px;
      }
      .msg-bubble.outgoing {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        border-bottom-right-radius: 4px;
      }
      .msg-bubble .msg-time {
        font-size: 9px;
        color: var(--dim);
        margin-top: 4px;
        text-align: right;
      }
      .msg-input-bar {
        display: flex;
        gap: 6px;
        padding: 8px 0;
        align-items: center;
      }
      .msg-input-bar input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 20px;
        border: 1px solid var(--card-border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        outline: none;
      }
      .msg-input-bar input:focus {
        border-color: var(--purple);
      }
      .msg-input-bar button {
        padding: 8px 16px;
        border-radius: 20px;
        border: none;
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 13px;
      }
      .empty-state .empty-icon {
        font-size: 40px;
        margin-bottom: 8px;
        opacity: 0.4;
      }
      .hidden {
        display: none !important;
      }
      .contact-badge {
        display: inline-block;
        background: var(--purple);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 8px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div id="contacts-view">
      <div class="app-header">
        <span class="ah-title">&#9993; Messages</span
        ><button
          onclick="newMessagePrompt()"
          style="
            margin-left: auto;
            background: none;
            border: none;
            color: var(--purple);
            font-size: 20px;
            cursor: pointer;
          "
        >
          +
        </button>
      </div>
      <div class="app-body" id="contact-list"></div>
    </div>
    <div id="thread-view" class="hidden">
      <div class="app-header">
        <button class="ah-back" onclick="backToList()">&larr;</button>
        <span class="ah-title" id="thread-title">Contact</span>
      </div>
      <div class="msg-thread">
        <div class="msg-list" id="msg-list"></div>
        <div class="msg-input-bar">
          <input
            type="text"
            id="msg-input"
            placeholder="Type a message..."
            onkeydown="onInputKey(event)"
          />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      var currentContact = null;
      var pollTimer = null;

      function contactNameFor(number) {
        var ud = bridge.getUD();
        if (ud && ud.contacts) {
          for (var i = 0; i < ud.contacts.length; i++) {
            if (ud.contacts[i].number === number) return ud.contacts[i].name;
          }
        }
        return number;
      }

      function timeAgo(iso) {
        if (!iso) return "";
        var diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return "now";
        if (diff < 3600) return Math.floor(diff / 60) + "m";
        if (diff < 86400) return Math.floor(diff / 3600) + "h";
        return Math.floor(diff / 86400) + "d";
      }

      function renderContacts() {
        var list = document.getElementById("contact-list");
        list.innerHTML =
          '<div class="empty-state" style="padding:20px 10px;">Loading...</div>';

        bridge
          .getMessageThreads()
          .then(function (threads) {
            if (!threads || threads.length === 0) {
              list.innerHTML =
                '<div class="empty-state"><div class="empty-icon">&#9993;</div>No conversations yet.<br>Tap + to start one.</div>';
              return;
            }
            var html = "";
            var gradients = [
              "linear-gradient(135deg,#3b82f6,#1d4ed8)",
              "linear-gradient(135deg,#22c55e,#16a34a)",
              "linear-gradient(135deg,#8b5cf6,#6d28d9)",
              "linear-gradient(135deg,#f59e0b,#d97706)",
              "linear-gradient(135deg,#ec4899,#db2777)",
              "linear-gradient(135deg,#14b8a6,#0d9488)",
              "linear-gradient(135deg,#f97316,#ea580c)",
              "linear-gradient(135deg,#a855f7,#7e22ce)",
            ];
            for (var j = 0; j < threads.length; j++) {
              var t = threads[j];
              var name = contactNameFor(t.otherNumber);
              var letter = name ? name.charAt(0).toUpperCase() : "?";
              var grad = gradients[j % gradients.length];
              var preview = bridge.esc(t.lastBody || "");
              if (preview.length > 30)
                preview = preview.substring(0, 30) + "...";
              var unreadBadge =
                t.unread > 0
                  ? '<span class="contact-badge">' + t.unread + "</span>"
                  : "";
              html +=
                '<div class="msg-contact" onclick="openThread(\'' +
                bridge.esc(t.otherNumber) +
                "')\">" +
                '<div class="mc-avatar" style="background:' +
                grad +
                ';">' +
                bridge.esc(letter) +
                "</div>" +
                '<div class="mc-info"><div class="mc-name">' +
                bridge.esc(name) +
                " " +
                unreadBadge +
                '</div><div class="mc-num">' +
                bridge.esc(t.otherNumber) +
                " &middot; " +
                timeAgo(t.lastAt) +
                "</div>" +
                (preview
                  ? '<div class="mc-preview">' + preview + "</div>"
                  : "") +
                "</div></div>";
            }
            list.innerHTML = html;
          })
          .catch(function (err) {
            list.innerHTML =
              '<div class="empty-state">' +
              bridge.esc(err.message || "Could not load messages.") +
              "</div>";
          });
      }

      function newMessagePrompt() {
        bridge.showCustomModal(
          "New Message",
          '<div class="form-field"><label>Phone Number</label><input type="text" id="cm-new-number" placeholder="e.g. 555-0101" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(124,58,237,0.15);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;"></div>',
          [
            { label: "Cancel", class: "btn", action: function () {} },
            {
              label: "Start",
              class: "btn primary",
              action: function () {
                var num = bridge.doc
                  .getElementById("cm-new-number")
                  .value.trim();
                if (num) openThread(num);
              },
            },
          ],
        );
      }

      function openThread(otherNumber) {
        currentContact = otherNumber;
        document.getElementById("contacts-view").classList.add("hidden");
        document.getElementById("thread-view").classList.remove("hidden");
        document.getElementById("thread-title").textContent =
          contactNameFor(otherNumber);
        renderMessages();
        document.getElementById("msg-input").value = "";
        document.getElementById("msg-input").focus();

        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(renderMessages, 4000);
      }

      function backToList() {
        currentContact = null;
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        document.getElementById("thread-view").classList.add("hidden");
        document.getElementById("contacts-view").classList.remove("hidden");
        renderContacts();
      }

      function renderMessages() {
        if (!currentContact) return;
        var list = document.getElementById("msg-list");
        var wasAtBottom =
          list.scrollTop + list.clientHeight >= list.scrollHeight - 20;

        bridge
          .getThreadMessages(currentContact)
          .then(function (msgs) {
            if (!msgs || msgs.length === 0) {
              list.innerHTML =
                '<div class="empty-state" style="padding:20px 10px;"><div class="empty-icon">&#9993;</div>No messages yet.</div>';
              return;
            }
            var html = "";
            for (var i = 0; i < msgs.length; i++) {
              var m = msgs[i];
              var time = new Date(m.createdAt).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });
              html +=
                '<div class="msg-bubble ' +
                (m.isMine ? "outgoing" : "incoming") +
                '">' +
                bridge.esc(m.body) +
                '<div class="msg-time">' +
                time +
                "</div>" +
                "</div>";
            }
            list.innerHTML = html;
            if (wasAtBottom) list.scrollTop = list.scrollHeight;
          })
          .catch(function () {});
      }

      function sendMessage() {
        var input = document.getElementById("msg-input");
        var text = input.value.trim();
        if (!text || !currentContact) return;
        input.value = "";
        bridge
          .sendMessage(currentContact, text)
          .then(function () {
            renderMessages();
          })
          .catch(function (err) {
            bridge.notif("Error", err.message || "Could not send message.");
          });
      }

      function onInputKey(e) {
        if (e.key === "Enter") sendMessage();
      }

      renderContacts();
    </script>
  </body>
</html>
