<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Bank</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
        --green: #22c55e;
      }
      html {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 8px 12px;
        height: calc(100% - 40px);
      }
      .balance-area {
        text-align: center;
        padding: 24px 0 16px;
      }
      .balance-amount {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 40px;
        color: #fff;
        letter-spacing: 1px;
      }
      .balance-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 2px;
      }
      .cash-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        padding: 6px 0 18px;
        font-size: 13px;
        color: var(--muted);
      }
      .cash-row .cash-icon {
        color: var(--mint);
      }
      .cash-row .cash-value {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 18px;
        color: var(--mint);
      }
      .bank-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        padding: 4px 0;
      }
      .bank-action {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 18px 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
      }
      .bank-action:hover {
        border-color: rgba(124, 58, 237, 0.3);
        background: rgba(124, 58, 237, 0.06);
      }
      .bank-action:active {
        transform: scale(0.96);
      }
      .ba-icon {
        font-size: 28px;
        margin-bottom: 6px;
        display: block;
      }
      .ba-label {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 14px;
        color: var(--text);
        display: block;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 999;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-box {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        width: 100%;
        max-width: 320px;
        padding: 20px;
      }
      .modal-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 14px;
      }
      .modal-body {
        margin-bottom: 16px;
      }
      .modal-body label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .modal-body input {
        width: 100%;
        padding: 11px 14px;
        border-radius: 8px;
        border: 1px solid rgba(124, 58, 237, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
        outline: none;
        margin-bottom: 10px;
      }
      .modal-body input:focus {
        border-color: var(--purple);
      }
      .modal-footer {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .modal-footer button {
        padding: 8px 18px;
        border-radius: 8px;
        border: none;
        font-size: 13px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.1s;
      }
      .modal-footer .btn-cancel {
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
      }
      .modal-footer .btn-cancel:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .modal-footer .btn-confirm {
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        color: #fff;
      }
      .modal-footer .btn-confirm:hover {
        opacity: 0.9;
      }
      .modal-error {
        color: var(--red);
        font-size: 12px;
        margin-top: -6px;
        margin-bottom: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app-header"><span class="ah-title">&#127974; Bank</span></div>
    <div class="app-body">
      <div class="balance-area">
        <div class="balance-amount" id="bank-amount">$0</div>
        <div class="balance-label">Bank Balance</div>
      </div>
      <div class="cash-row">
        <span class="cash-icon">&#128176;</span>
        <span class="cash-value" id="cash-amount">$0</span>
        <span style="font-size: 11px; color: var(--muted)">on hand</span>
      </div>
      <div class="bank-actions">
        <div class="bank-action" onclick="openDeposit()">
          <span class="ba-icon">&#128228;</span>
          <span class="ba-label">Deposit</span>
        </div>
        <div class="bank-action" onclick="openWithdraw()">
          <span class="ba-icon">&#128229;</span>
          <span class="ba-label">Withdraw</span>
        </div>
        <div class="bank-action" onclick="openTransfer()">
          <span class="ba-icon">&#128184;</span>
          <span class="ba-label">Transfer</span>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-title" id="modal-title">Title</div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-error" id="modal-error"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      var modalMode = "";
      console.log("Bank bridge:", bridge, "parent:", window.parent);
      function render() {
        var ud = bridge.getUD();
        console.log(
          "Bank getUD:",
          ud,
          "currentUser:",
          bridge.currentUser ? bridge.currentUser() : "no fn",
        );
        var bank = ud && ud.bank !== undefined ? ud.bank : 0;
        var cash = ud && ud.cash !== undefined ? ud.cash : 0;
        document.getElementById("bank-amount").textContent =
          "$" + formatNum(bank);
        document.getElementById("cash-amount").textContent =
          "$" + formatNum(cash);
      }
      function formatNum(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }
      function openDeposit() {
        modalMode = "deposit";
        showModal(
          "Deposit",
          ' <label for="mod-amount">Amount to deposit</label><input type="number" id="mod-amount" placeholder="0" min="1">',
        );
      }
      function openWithdraw() {
        modalMode = "withdraw";
        showModal(
          "Withdraw",
          ' <label for="mod-amount">Amount to withdraw</label><input type="number" id="mod-amount" placeholder="0" min="1">',
        );
      }
      function openTransfer() {
        modalMode = "transfer";
        showModal(
          "Transfer",
          ' <label for="mod-amount">Amount</label><input type="number" id="mod-amount" placeholder="0" min="1"><label for="mod-target">Recipient username</label><input type="text" id="mod-target" placeholder="Username">',
        );
      }
      function showModal(title, bodyHtml) {
        document.getElementById("modal-title").textContent = title;
        document.getElementById("modal-body").innerHTML = bodyHtml;
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal-error").textContent = "";
        var footer = document.getElementById("modal-footer");
        footer.innerHTML =
          '<button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-confirm" onclick="confirmAction()">Confirm</button>';
        document.getElementById("modal-overlay").classList.add("active");
        setTimeout(function () {
          var inp = document.getElementById("mod-amount");
          if (inp) inp.focus();
        }, 100);
      }
      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("active");
        modalMode = "";
      }
      function confirmAction() {
        var amountInput = document.getElementById("mod-amount");
        var amount = parseInt(amountInput.value, 10);
        if (!amount || amount <= 0) {
          showError("Enter a valid amount.");
          return;
        }
        var ud = bridge.getUD();
        if (!ud) return;
        var error = "";
        if (modalMode === "deposit") {
          if (amount > (ud.cash || 0)) {
            showError("Not enough cash on hand.");
            return;
          }
          ud.cash = (ud.cash || 0) - amount;
          ud.bank = (ud.bank || 0) + amount;
          bridge.notif("Deposit", "$" + formatNum(amount) + " deposited.");
        } else if (modalMode === "withdraw") {
          if (amount > (ud.bank || 0)) {
            showError("Not enough funds in bank.");
            return;
          }
          ud.bank = (ud.bank || 0) - amount;
          ud.cash = (ud.cash || 0) + amount;
          bridge.notif("Withdrawal", "$" + formatNum(amount) + " withdrawn.");
        } else if (modalMode === "transfer") {
          var targetInput = document.getElementById("mod-target");
          var targetName = targetInput ? targetInput.value.trim() : "";
          if (!targetName) {
            showError("Enter a recipient username.");
            return;
          }
          bridge
            .transferBank(targetName, amount)
            .then(function () {
              bridge.notif(
                "Transfer",
                "$" +
                  formatNum(amount) +
                  " transferred to " +
                  bridge.esc(targetName) +
                  ".",
              );
              closeModal();
              bridge.updateHUD();
              bridge.loadProfile();
              render();
            })
            .catch(function (err) {
              showError(err.message || "Transfer failed.");
            });
          return;
        }
        closeModal();
        bridge.saveData();
        bridge.updateHUD();
        bridge.loadProfile();
        render();
      }
      function showError(msg) {
        var el = document.getElementById("modal-error");
        el.textContent = msg;
        el.style.display = "block";
      }
      render();
    </script>
  </body>
</html>
