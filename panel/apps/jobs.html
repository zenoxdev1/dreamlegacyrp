<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Jobs</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
        --green: #22c55e;
        --yellow: #eab308;
      }
      html {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 8px 12px;
        height: calc(100% - 40px);
      }
      .job-current {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .job-current .jct-icon {
        font-size: 28px;
      }
      .job-current .jct-info {
        flex: 1;
      }
      .job-current .jct-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .job-current .jct-name {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 18px;
        color: var(--cyan);
      }
      .job-current .jct-pay {
        font-size: 12px;
        color: var(--mint);
      }
      .job-current .jct-quit {
        background: none;
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--red);
        padding: 6px 14px;
        border-radius: 8px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .job-current .jct-quit:hover {
        background: rgba(239, 68, 68, 0.1);
      }
      .job-pending {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .job-pending .jp-icon {
        font-size: 24px;
      }
      .job-pending .jp-info {
        flex: 1;
      }
      .job-pending .jp-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .job-pending .jp-name {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--yellow);
      }
      .job-pending .jp-msg {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .section-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .job-card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .job-card .jc-icon {
        font-size: 26px;
        width: 40px;
        text-align: center;
      }
      .job-card .jc-info {
        flex: 1;
        min-width: 0;
      }
      .job-card .job-name {
        font-size: 14px;
        font-weight: 600;
      }
      .job-card .job-pay {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 14px;
        color: var(--mint);
      }
      .job-card .job-desc {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .job-card .jc-action {
        flex-shrink: 0;
      }
      .job-card .jc-action button {
        padding: 6px 14px;
        border-radius: 8px;
        border: none;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .job-card .jc-action .btn-apply {
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        color: #fff;
      }
      .job-card .jc-action .btn-apply:hover {
        opacity: 0.9;
      }
      .job-card .jc-action .btn-disabled {
        background: rgba(255, 255, 255, 0.06);
        color: var(--dim);
        cursor: default;
      }
      .job-status {
        display: inline-block;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 6px;
        margin-left: 6px;
        vertical-align: middle;
      }
      .job-status.hired {
        background: rgba(6, 182, 212, 0.15);
        color: var(--cyan);
      }
      .job-status.pending {
        background: rgba(234, 179, 8, 0.15);
        color: var(--yellow);
      }
    </style>
  </head>
  <body>
    <div class="app-header"><span class="ah-title">&#128188; Jobs</span></div>
    <div class="app-body" id="app-body"></div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;
      var ALL_JOBS = [
        {
          name: "Police Officer",
          pay: 3500,
          icon: "\u{1F6A8}",
          desc: "Protect and serve the city. Respond to emergencies and enforce the law.",
        },
        {
          name: "EMS Paramedic",
          pay: 3200,
          icon: "\u{1F691}",
          desc: "Provide emergency medical care. Save lives across the city.",
        },
        {
          name: "Mechanic",
          pay: 2800,
          icon: "\u{1F527}",
          desc: "Repair and maintain vehicles. Keep the city moving.",
        },
        {
          name: "Rancher",
          pay: 2500,
          icon: "\u{1F404}",
          desc: "Tend to livestock and manage ranch operations.",
        },
        {
          name: "Trucker",
          pay: 2700,
          icon: "\u{1F69A}",
          desc: "Haul cargo across long distances. Deliver goods on time.",
        },
        {
          name: "Taxi Driver",
          pay: 2400,
          icon: "\u{1F696}",
          desc: "Transport passengers around the city. Earn fares per trip.",
        },
        {
          name: "Delivery Driver",
          pay: 2200,
          icon: "\u{1F69C}",
          desc: "Deliver packages and food to residents. Quick and reliable.",
        },
        {
          name: "Construction",
          pay: 2600,
          icon: "\u{1F3D7}\uFE0F",
          desc: "Build and repair structures. Hard work pays off.",
        },
        {
          name: "Fishing",
          pay: 2300,
          icon: "\u{1F3A3}",
          desc: "Catch and sell fish. A peaceful life on the water.",
        },
        {
          name: "Mining",
          pay: 2900,
          icon: "\u{26CF}\uFE0F",
          desc: "Extract valuable minerals. Dangerous but rewarding.",
        },
        {
          name: "Freelancer",
          pay: 2000,
          icon: "\u{1F4BB}",
          desc: "Take on various gigs. Flexible work for independent souls.",
        },
      ];
      function render() {
        var ud = bridge.getUD();
        var body = document.getElementById("app-body");
        var html = "";
        if (ud) {
          if (ud.currentJob) {
            var job = getJobByName(ud.currentJob);
            var icon = job ? job.icon : "\u{1F4BC}";
            var pay = job ? job.pay : 0;
            html +=
              '<div class="job-current">' +
              '<div class="jct-icon">' +
              icon +
              "</div>" +
              '<div class="jct-info">' +
              '<div class="jct-label">Current Job</div>' +
              '<div class="jct-name">' +
              bridge.esc(ud.currentJob) +
              "</div>" +
              '<div class="jct-pay">$' +
              formatNum(pay) +
              "/hr</div>" +
              "</div>" +
              '<button class="jct-quit" onclick="quitJob()">Quit</button>' +
              "</div>";
          } else if (ud.pendingJob) {
            html +=
              '<div class="job-pending">' +
              '<div class="jp-icon">&#9203;</div>' +
              '<div class="jp-info">' +
              '<div class="jp-label">Pending Application</div>' +
              '<div class="jp-name">' +
              bridge.esc(ud.pendingJob) +
              "</div>" +
              '<div class="jp-msg">Awaiting approval. Check back later.</div>' +
              "</div>" +
              "</div>";
          }
        }
        html += '<div class="section-title">Available Jobs</div>';
        for (var i = 0; i < ALL_JOBS.length; i++) {
          var j = ALL_JOBS[i];
          var isActive = ud && ud.currentJob === j.name;
          var isPending = ud && ud.pendingJob === j.name;
          var disabled = isActive || isPending || (ud && ud.currentJob);
          var badge = "";
          if (isActive) badge = '<span class="job-status hired">Active</span>';
          else if (isPending)
            badge = '<span class="job-status pending">Pending</span>';
          var btnHtml = "";
          if (isActive) {
            btnHtml = '<button class="btn-disabled" disabled>Active</button>';
          } else if (isPending) {
            btnHtml = '<button class="btn-disabled" disabled>Pending</button>';
          } else if (ud && ud.currentJob) {
            btnHtml =
              '<button class="btn-disabled" disabled>Unavailable</button>';
          } else {
            btnHtml =
              '<button class="btn-apply" onclick="applyJob(\'' +
              bridge.esc(j.name) +
              "')\">Apply</button>";
          }
          html +=
            '<div class="job-card">' +
            '<div class="jc-icon">' +
            j.icon +
            "</div>" +
            '<div class="jc-info">' +
            '<div class="job-name">' +
            bridge.esc(j.name) +
            badge +
            "</div>" +
            '<div class="job-pay">$' +
            formatNum(j.pay) +
            "/hr</div>" +
            '<div class="job-desc">' +
            bridge.esc(j.desc) +
            "</div>" +
            "</div>" +
            '<div class="jc-action">' +
            btnHtml +
            "</div>" +
            "</div>";
        }
        body.innerHTML = html;
      }
      function getJobByName(name) {
        for (var i = 0; i < ALL_JOBS.length; i++) {
          if (ALL_JOBS[i].name === name) return ALL_JOBS[i];
        }
        return null;
      }
      function formatNum(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }
      function applyJob(name) {
        var ud = bridge.getUD();
        if (!ud) return;
        if (ud.currentJob) {
          bridge.notif("Error", "You already have a job.");
          return;
        }
        if (ud.pendingJob) {
          bridge.notif("Error", "You already have a pending application.");
          return;
        }
        ud.pendingJob = name;
        bridge.saveData();
        bridge.notif("Application Sent", "Applied for " + name + ".");
        render();
      }
      function quitJob() {
        bridge.showCustomModal(
          "Quit Job",
          '<p style="color:#64748b;font-size:13px;">Are you sure you want to quit your job?</p>',
          [
            { label: "Cancel", class: "btn", action: function () {} },
            {
              label: "Quit",
              class: "btn",
              action: function () {
                var ud = bridge.getUD();
                if (!ud) return;
                ud.currentJob = null;
                ud.pendingJob = null;
                bridge.saveData();
                bridge.updateHUD();
                bridge.loadProfile();
                bridge.notif("Job", "You have quit your job.");
                render();
              },
            },
          ],
        );
      }
      render();
    </script>
  </body>
</html>
