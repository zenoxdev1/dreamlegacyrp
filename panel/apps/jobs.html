<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Jobs</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --purple: #7c3aed;
        --purple-dark: #5b21b6;
        --cyan: #06b6d4;
        --mint: #34d399;
        --bg: #0a0a0f;
        --card: #13131a;
        --card-border: rgba(124, 58, 237, 0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --dim: #475569;
        --red: #ef4444;
        --green: #22c55e;
        --yellow: #eab308;
      }
      html {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        background: var(--card);
        border-bottom: 1px solid var(--card-border);
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .app-header .ah-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .app-body {
        overflow-y: auto;
        padding: 8px 12px;
        height: calc(100% - 40px);
      }
      .job-current {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .job-current .jct-icon {
        font-size: 28px;
      }
      .job-current .jct-info {
        flex: 1;
      }
      .job-current .jct-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .job-current .jct-name {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 18px;
        color: var(--cyan);
      }
      .job-current .jct-pay {
        font-size: 12px;
        color: var(--mint);
      }
      .job-current .jct-quit {
        background: none;
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--red);
        padding: 6px 14px;
        border-radius: 8px;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .job-current .jct-quit:hover {
        background: rgba(239, 68, 68, 0.1);
      }
      .job-pending {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .job-pending .jp-icon {
        font-size: 24px;
      }
      .job-pending .jp-info {
        flex: 1;
      }
      .job-pending .jp-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .job-pending .jp-name {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: var(--yellow);
      }
      .job-pending .jp-msg {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .section-title {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .job-card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .job-card .jc-icon {
        font-size: 26px;
        width: 40px;
        text-align: center;
      }
      .job-card .jc-info {
        flex: 1;
        min-width: 0;
      }
      .job-card .job-name {
        font-size: 14px;
        font-weight: 600;
      }
      .job-card .job-pay {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 14px;
        color: var(--mint);
      }
      .job-card .job-desc {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .job-card .jc-action {
        flex-shrink: 0;
      }
      .job-card .jc-action button {
        padding: 6px 14px;
        border-radius: 8px;
        border: none;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .job-card .jc-action .btn-apply {
        background: linear-gradient(135deg, var(--purple), var(--purple-dark));
        color: #fff;
      }
      .job-card .jc-action .btn-apply:hover {
        opacity: 0.9;
      }
      .job-card .jc-action .btn-disabled {
        background: rgba(255, 255, 255, 0.06);
        color: var(--dim);
        cursor: default;
      }
      .job-status {
        display: inline-block;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 6px;
        margin-left: 6px;
        vertical-align: middle;
      }
      .job-status.hired {
        background: rgba(6, 182, 212, 0.15);
        color: var(--cyan);
      }
      .job-status.pending {
        background: rgba(234, 179, 8, 0.15);
        color: var(--yellow);
      }
    </style>
  </head>
  <body>
    <div class="app-header"><span class="ah-title">&#128188; Jobs</span></div>
    <div class="app-body" id="app-body"></div>
    <script>
      var bridge =
        (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;

      var ALL_JOBS = [
        {
          id: "mechanic",
          name: "Mechanic",
          icon: "\u{1F527}",
          pay: 28,
          yearly: "~$58,000/yr",
          desc: "Repair, service, and customize vehicles at the city garage. Diagnose issues, replace parts, and keep the city's cars running.",
          requirements: [{ label: "No license required", license: null }],
        },
        {
          id: "taxi",
          name: "Taxi Driver",
          icon: "\u{1F696}",
          pay: 22,
          yearly: "~$46,000/yr",
          desc: "Pick up passengers and drive them across the city. Fares scale with trip distance.",
          requirements: [{ label: "Driver's License B (Car)", license: "B" }],
        },
        {
          id: "delivery",
          name: "Delivery Driver",
          icon: "\u{1F69A}",
          pay: 21,
          yearly: "~$44,000/yr",
          desc: "Deliver packages and food orders to residents across the city, on time and in one piece.",
          requirements: [{ label: "Driver's License B (Car)", license: "B" }],
        },
        {
          id: "security",
          name: "Security Guard",
          icon: "\u{1F482}",
          pay: 24,
          yearly: "~$50,000/yr",
          desc: "Guard private properties, stores, and events. Keep the peace and deter trouble.",
          requirements: [
            { label: "Weapons Permit", license: "weapons" },
            { label: "Clean criminal record", license: null },
          ],
        },
        {
          id: "bus",
          name: "Bus Driver",
          icon: "\u{1F68C}",
          pay: 27,
          yearly: "~$56,000/yr",
          desc: "Operate public transit routes across the city on a fixed schedule. Passenger safety is your priority.",
          requirements: [
            { label: "Driver's License D (Passenger Transport)", license: "D" },
          ],
        },
        {
          id: "trucker",
          name: "Truck Driver",
          icon: "\u{1F69B}",
          pay: 32,
          yearly: "~$66,000/yr",
          desc: "Haul heavy cargo across long distances between the city's industrial zones.",
          requirements: [
            { label: "Driver's License C (Heavy Goods)", license: "C" },
          ],
        },
        {
          id: "tow",
          name: "Tow Truck Operator",
          icon: "\u{1F6FB}",
          pay: 29,
          yearly: "~$60,000/yr",
          desc: "Recover disabled, abandoned, or illegally parked vehicles across the city.",
          requirements: [
            { label: "Driver's License C (Heavy Goods)", license: "C" },
            { label: "Trailer Endorsement E", license: "E" },
          ],
        },
        {
          id: "garbage",
          name: "Garbage Collector",
          icon: "\u{1F5D1}\uFE0F",
          pay: 25,
          yearly: "~$52,000/yr",
          desc: "Collect and dispose of waste along assigned city routes. Early mornings, steady pay.",
          requirements: [
            { label: "Driver's License C (Heavy Goods)", license: "C" },
          ],
        },
        {
          id: "construction",
          name: "Construction Worker",
          icon: "\u{1F3D7}\uFE0F",
          pay: 26,
          yearly: "~$54,000/yr",
          desc: "Build and repair structures across the city. Physically demanding, always in demand.",
          requirements: [
            { label: "No license required", license: null },
            { label: "Safety Certification recommended", license: null },
          ],
        },
      ];

      var jobAppStatus = { status: "none" };

      function getJobById(id) {
        for (var i = 0; i < ALL_JOBS.length; i++) {
          if (ALL_JOBS[i].id === id) return ALL_JOBS[i];
        }
        return null;
      }

      function formatNum(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function render() {
        var ud = bridge.getUD();
        var body = document.getElementById("app-body");
        body.innerHTML =
          '<div style="text-align:center;padding:30px 0;color:var(--muted);">Loading...</div>';

        bridge
          .getJobApplicationStatus()
          .then(function (res) {
            jobAppStatus = res;
            renderBody(ud);
          })
          .catch(function () {
            renderBody(ud);
          });
      }

      function renderBody(ud) {
        var body = document.getElementById("app-body");
        var html = "";

        if (ud && ud.currentJob) {
          var job = ALL_JOBS.filter(function (j) {
            return j.name === ud.currentJob;
          })[0];
          var icon = job ? job.icon : "\u{1F4BC}";
          var pay = job ? job.pay : 0;
          html +=
            '<div class="job-current">' +
            '<div class="jct-icon">' +
            icon +
            "</div>" +
            '<div class="jct-info">' +
            '<div class="jct-label">Current Job</div>' +
            '<div class="jct-name">' +
            bridge.esc(ud.currentJob) +
            "</div>" +
            '<div class="jct-pay">$' +
            formatNum(pay) +
            "/hr</div>" +
            "</div>" +
            '<button class="jct-quit" onclick="quitJob()">Quit</button>' +
            "</div>";
        } else if (jobAppStatus.status === "pending") {
          html +=
            '<div class="job-pending">' +
            '<div class="jp-icon">&#9203;</div>' +
            '<div class="jp-info">' +
            '<div class="jp-label">Pending Application</div>' +
            '<div class="jp-name">' +
            bridge.esc(jobAppStatus.jobName) +
            "</div>" +
            '<div class="jp-msg">Awaiting staff approval. Check back later.</div>' +
            "</div></div>";
        } else if (jobAppStatus.status === "denied") {
          html +=
            '<div class="job-pending"><div class="jp-icon">&#10060;</div><div class="jp-info">' +
            '<div class="jp-label">Application Denied</div>' +
            '<div class="jp-name">' +
            bridge.esc(jobAppStatus.jobName) +
            "</div>" +
            "</div></div>";
        }

        html += '<div class="section-title">Available Jobs</div>';
        for (var i = 0; i < ALL_JOBS.length; i++) {
          var j = ALL_JOBS[i];
          var isActive = ud && ud.currentJob === j.name;
          var isPending =
            jobAppStatus.status === "pending" &&
            jobAppStatus.jobName === j.name;
          var badge = isActive
            ? '<span class="job-status hired">Active</span>'
            : isPending
              ? '<span class="job-status pending">Pending</span>'
              : "";
          html +=
            '<div class="job-card" onclick="openJobDetail(\'' +
            j.id +
            '\')" style="cursor:pointer;">' +
            '<div class="jc-icon">' +
            j.icon +
            "</div>" +
            '<div class="jc-info">' +
            '<div class="job-name">' +
            bridge.esc(j.name) +
            badge +
            "</div>" +
            '<div class="job-pay">$' +
            formatNum(j.pay) +
            '/hr <span style="color:var(--muted);font-weight:400;">(' +
            j.yearly +
            ")</span></div>" +
            '<div class="job-desc">' +
            bridge.esc(j.requirements[0].label) +
            "</div>" +
            "</div>" +
            "</div>";
        }
        body.innerHTML = html;
      }

      function openJobDetail(id) {
        var j = getJobById(id);
        if (!j) return;
        var ud = bridge.getUD();
        var alreadyBusy =
          !!(ud && ud.currentJob) || jobAppStatus.status === "pending";

        bridge
          .getMyLicenses()
          .then(function (licReqs) {
            var approvedTypes = {};
            for (var i = 0; i < licReqs.length; i++) {
              if (licReqs[i].status === "approved")
                approvedTypes[licReqs[i].licenseType] = true;
            }

            var missing = [];
            var reqsHtml = j.requirements
              .map(function (r) {
                if (!r.license)
                  return (
                    '<li style="margin-bottom:4px;">' +
                    bridge.esc(r.label) +
                    "</li>"
                  );
                var has = !!approvedTypes[r.license];
                if (!has) missing.push(r.label);
                return (
                  '<li style="margin-bottom:4px;">' +
                  (has
                    ? '<span style="color:var(--mint);">&#10003;</span> '
                    : '<span style="color:var(--red);">&#10007;</span> ') +
                  bridge.esc(r.label) +
                  (has
                    ? ""
                    : ' <span style="color:var(--muted);font-size:11px;">(apply for this in Government)</span>') +
                  "</li>"
                );
              })
              .join("");

            var canApply = !alreadyBusy && missing.length === 0;

            bridge.showCustomModal(
              j.icon + " " + j.name,
              '<p style="color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:12px;">' +
                bridge.esc(j.desc) +
                "</p>" +
                '<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;margin-bottom:10px;">' +
                '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Pay</div>' +
                "<div style=\"font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:var(--mint);\">$" +
                formatNum(j.pay) +
                '/hr <span style="font-size:12px;color:var(--muted);font-weight:400;">(' +
                j.yearly +
                ")</span></div>" +
                "</div>" +
                '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Requirements</div>' +
                '<ul style="padding-left:18px;font-size:13px;color:var(--text);">' +
                reqsHtml +
                "</ul>" +
                (missing.length && !alreadyBusy
                  ? '<p style="color:var(--red);font-size:12px;margin-top:8px;">Missing required license(s) \u2014 get them in Government first.</p>'
                  : ""),
              canApply
                ? [
                    { label: "Close", class: "btn", action: function () {} },
                    {
                      label: "Apply",
                      class: "btn primary",
                      action: function () {
                        applyJob(j.name);
                      },
                    },
                  ]
                : [{ label: "Close", class: "btn", action: function () {} }],
            );
          })
          .catch(function () {
            var reqsHtml = j.requirements
              .map(function (r) {
                return (
                  '<li style="margin-bottom:4px;">' +
                  bridge.esc(r.label) +
                  "</li>"
                );
              })
              .join("");
            bridge.showCustomModal(
              j.icon + " " + j.name,
              '<p style="color:var(--muted);font-size:13px;">' +
                bridge.esc(j.desc) +
                '</p><ul style="padding-left:18px;font-size:13px;">' +
                reqsHtml +
                "</ul>",
              [{ label: "Close", class: "btn", action: function () {} }],
            );
          });
      }

      function applyJob(name) {
        bridge
          .applyJob(name)
          .then(function () {
            bridge.notif(
              "Application Sent",
              "Applied for " + name + ". Awaiting staff approval.",
            );
            render();
          })
          .catch(function (err) {
            bridge.notif("Error", err.message || "Could not apply.");
          });
      }

      function quitJob() {
        bridge.showCustomModal(
          "Quit Job",
          '<p style="color:#64748b;font-size:13px;">Are you sure you want to quit your job?</p>',
          [
            { label: "Cancel", class: "btn", action: function () {} },
            {
              label: "Quit",
              class: "btn",
              action: function () {
                bridge
                  .quitJob()
                  .then(function () {
                    bridge.updateHUD();
                    bridge.loadProfile();
                    bridge.notif("Job", "You have quit your job.");
                    render();
                  })
                  .catch(function (err) {
                    bridge.notif("Error", err.message || "Could not quit.");
                  });
              },
            },
          ],
        );
      }

      render();
    </script>
  </body>
</html>
