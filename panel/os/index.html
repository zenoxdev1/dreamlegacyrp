<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DLRP | Phone Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4;
    --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12);
    --text: #e2e8f0; --muted: #64748b; --dim: #475569; --mint: #34d399; --red: #ef4444;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
.glow { position: fixed; top: -300px; left: -300px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.glow2 { top: auto; bottom: -300px; right: -300px; left: auto; background: radial-gradient(circle, rgba(6,182,212,.06) 0%, transparent 70%); }
.topbar { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: rgba(19,19,26,.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--card-border); }
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand img { height: 36px; }
.brand-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg,var(--purple),var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.brand-title span { color: var(--cyan); -webkit-text-fill-color: var(--cyan); }
.nav-links { display: flex; gap: 16px; align-items: center; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: color .2s; padding: 6px 14px; border-radius: 8px; }
.nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(124,58,237,.1); }
.main-wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
.card { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; }
.btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--card-border); background: transparent; color: var(--text); font-size: 13px; font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: .06em; transition: all .2s; }
.btn:hover { filter: brightness(1.15); }
.btn.primary { background: linear-gradient(135deg,var(--purple),var(--purple-dark)); border: none; color: #fff; }
h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; margin-bottom: 6px; }
.sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

/* ---- Phone Models Grid ---- */
.models { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 20px; margin-top: 20px; }

/* Unique shapes per model */
.model-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: all .3s; }
.model-card:hover { border-color: var(--purple); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(124,58,237,.15); }
/* iGlitch X - Notch shape */
.model-iglitch .phone-preview { position: relative; width: 120px; height: 220px; background: linear-gradient(135deg,#1a1a2e,#16213e); border-radius: 20px; margin: 0 auto 12px; border: 2px solid #333; overflow: hidden; }
.model-iglitch .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 18px; background: #000; border-radius: 0 0 10px 10px; }
.model-iglitch .phone-screen { position: absolute; top: 22px; left: 4px; right: 4px; bottom: 4px; background: linear-gradient(135deg,#0f3460,#533483); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 10px; }

/* Samsung Dream S24 - Punch hole */
.model-samsung .phone-preview { position: relative; width: 120px; height: 220px; background: linear-gradient(135deg,#1c1c1e,#2c2c2e); border-radius: 24px; margin: 0 auto 12px; border: 2px solid #444; overflow: hidden; }
.model-samsung .phone-punchhole { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #000; border-radius: 50%; }
.model-samsung .phone-screen { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: linear-gradient(135deg,#1a1a2e,#2d2d44); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 10px; }

/* Pixel Play 8 - Pill shape */
.model-pixel .phone-preview { position: relative; width: 120px; height: 220px; background: linear-gradient(135deg,#2d2d3a,#1a1a2e); border-radius: 16px; margin: 0 auto 12px; border: 2px solid #3a3a4a; overflow: hidden; }
.model-pixel .phone-pill { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 40px; height: 12px; background: #000; border-radius: 6px; }
.model-pixel .phone-screen { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: linear-gradient(135deg,#0d1117,#161b22); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 10px; }

/* OnePlus Dark - Teardrop notch */
.model-oneplus .phone-preview { position: relative; width: 120px; height: 220px; background: linear-gradient(135deg,#1a1a2e,#0f0f1a); border-radius: 22px; margin: 0 auto 12px; border: 2px solid #2a2a3a; overflow: hidden; }
.model-oneplus .phone-teardrop { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 14px; background: #000; border-radius: 0 0 12px 12px; }
.model-oneplus .phone-screen { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: linear-gradient(135deg,#1a1a2e,#2a2a3a); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 10px; }

/* Huawei Star - Waterfall edge */
.model-huawei .phone-preview { position: relative; width: 120px; height: 220px; background: linear-gradient(135deg,#1a1a2e,#0a0a12); border-radius: 20px; margin: 0 auto 12px; border: 2px solid #2a2a3a; overflow: hidden; }
.model-huawei .phone-screen { position: absolute; top: 4px; left: 0; right: 0; bottom: 4px; background: linear-gradient(135deg,#0a0a12,#1a1a2e); border-radius: 16px 4px 4px 16px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 10px; }

/* Sony Xperia - Square edges */
.model-sony .phone-preview { position: relative; width: 110px; height: 220px; background: linear-gradient(135deg,#1a1a2e,#16213e); border-radius: 6px; margin: 0 auto 12px; border: 2px solid #333; overflow: hidden; }
.model-sony .phone-screen { position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: linear-gradient(135deg,#0f3460,#533483); border-radius: 2px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 10px; }

.model-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; margin-top: 8px; }
.model-desc { font-size: 12px; color: var(--muted); margin: 4px 0 8px; }
.model-price { font-size: 20px; font-weight: 700; color: var(--mint); margin-bottom: 10px; }

/* ---- Purchase Modal ---- */
.overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; }
.overlay-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); }
.overlay-card { position: relative; width: 100%; max-width: 380px; margin: 20px; }
.hidden { display: none !important; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.form-field input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid var(--card-border); background: rgba(255,255,255,.05); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
.purchase-preview { text-align: center; }
.purchase-preview .pp-model { font-size: 22px; font-weight: 700; font-family: 'Rajdhani', sans-serif; color: var(--text); margin-bottom: 4px; }
.purchase-preview .pp-price { font-size: 24px; font-weight: 700; color: var(--mint); margin: 8px 0; }
.actions { display: flex; gap: 8px; margin-top: 16px; }
.actions .btn { flex: 1; }
</style>
</head>
<body>
<div class="glow"></div><div class="glow glow2"></div>

<div class="topbar">
    <a class="brand" href="../index.html">
        <img src="../assets/img/dlrp.png" alt="DLRP" onerror="this.style.display='none'">
        <span class="brand-title">Dream <span>Legacy</span> RolePlay</span>
    </a>
    <div class="nav-links">
        <a href="../index.html">Panel</a>
        <a href="index.html" class="active">Phone Shop</a>
        <a href="os.html">DreamOS</a>
    </div>
</div>

<div class="main-wrap">
    <h1>&#128241; Phone Shop</h1>
    <p class="sub">Choose your device. Each model has its own unique design.</p>

    <div id="model-list" class="models"></div>
</div>


<script>
/* ---- Phone Models linking to individual model pages ---- */
var phoneModels = [
    { id: "iglitch", file: "model.html", name: "iGlitch X", cls: "model-iglitch", price: 599, desc: "The iconic notch. Face ID, OLED display.", color: "#533483" },
    { id: "samsung", file: "model1.html", name: "Samsung Dream S24", cls: "model-samsung", price: 799, desc: "Punch-hole camera, Dynamic AMOLED.", color: "#2d2d44" },
    { id: "pixel", file: "model2.html", name: "Pixel Play 8", cls: "model-pixel", price: 699, desc: "Pill-shaped cutout, pure Android.", color: "#161b22" },
    { id: "oneplus", file: "model3.html", name: "OnePlus Dark", cls: "model-oneplus", price: 649, desc: "Teardrop notch, smooth 120Hz.", color: "#2a2a3a" },
    { id: "huawei", file: "model4.html", name: "Huawei Star", cls: "model-huawei", price: 549, desc: "Waterfall edge display, no bezels.", color: "#1a1a2e" },
    { id: "sony", file: "model5.html", name: "Sony Xperia Pro", cls: "model-sony", price: 899, desc: "Square edges, professional grade.", color: "#533483" }
];

function renderShop() {
    var container = document.getElementById("model-list");
    container.innerHTML = phoneModels.map(function(m) {
        return '<div class="model-card ' + m.cls + '" onclick="location.href=\'' + m.file + '\'">'
            + '<div class="phone-preview"><div class="phone-notch"></div><div class="phone-punchhole"></div><div class="phone-pill"></div><div class="phone-teardrop"></div><div class="phone-screen">' + m.name + '</div></div>'
            + '<div class="model-name">' + m.name + '</div>'
            + '<div class="model-desc">' + m.desc + '</div>'
            + '<div class="model-price">$' + m.price + '</div>'
            + '<a href="' + m.file + '" class="btn primary small" style="display:inline-block;text-decoration:none;">View</a>'
            + '</div>';
    }).join("");
}

renderShop();
</script>
</body>
</html>
