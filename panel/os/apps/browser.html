<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Browser</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }:root { --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4; --mint: #34d399; --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12); --text: #e2e8f0; --muted: #64748b; --dim: #475569; --red: #ef4444; }body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; padding: 0; margin: 0; }.app-header { display: flex; align-items: center; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 8px; }.app-header .ah-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; flex: 1; }.app-body { overflow-y: auto; padding: 0; height: calc(100vh - 40px); display: flex; flex-direction: column; }.browser-bar { display: flex; gap: 6px; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); align-items: center; flex-shrink: 0; }.browser-bar input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--card-border); background: rgba(255,255,255,.05); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }.browser-bar input:focus { border-color: var(--purple); }.browser-bar button { padding: 7px 16px; border-radius: 8px; border: none; background: linear-gradient(135deg,var(--purple),var(--purple-dark)); color: #fff; font-size: 12px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; white-space: nowrap; }.browser-bar button:active { opacity: .7; }.browser-frame { flex: 1; border: none; width: 100%; background: #fff; }/* Start page */.start-page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: radial-gradient(ellipse at center, rgba(124,58,237,.06) 0%, transparent 70%); }.start-page .sp-icon { font-size: 48px; margin-bottom: 8px; opacity: .6; }.start-page h2 { font-family: 'Rajdhani', sans-serif; font-size: 22px; margin-bottom: 4px; }.start-page .sp-sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }.quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 260px; }.quick-links a { padding: 10px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--card); color: var(--text); text-decoration: none; font-size: 12px; font-family: 'Rajdhani', sans-serif; font-weight: 600; transition: all .15s; }.quick-links a:hover { border-color: var(--purple); background: rgba(124,58,237,.08); }.quick-links a .ql-icon { display: block; font-size: 20px; margin-bottom: 2px; }</style></head><body><div class="app-header">    <span class="ah-title">&#127760; Browser</span></div><div class="app-body">    <div class="browser-bar">        <input type="text" id="url-input" placeholder="Search or enter URL..." onkeydown="onUrlKey(event)">        <button onclick="navigate()">Go</button>    </div>    <iframe class="browser-frame" id="browser-frame" style="display:none;"></iframe>    <div class="start-page" id="start-page">        <div class="sp-icon">&#127760;</div>        <h2>DLRP Browser</h2>        <p class="sp-sub">Browse the web within DreamOS</p>        <div class="quick-links">            <a href="#" onclick="goTo('https://www.google.com')"><span class="ql-icon">&#128269;</span>Google</a>            <a href="#" onclick="goTo('https://www.youtube.com')"><span class="ql-icon">&#127909;</span>YouTube</a>            <a href="#" onclick="goTo('https://discord.com')"><span class="ql-icon">&#128172;</span>Discord</a>            <a href="#" onclick="goTo('https://www.twitch.tv')"><span class="ql-icon">&#127909;</span>Twitch</a>        </div>    </div></div><script>
var bridge = (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;var frame = document.getElementById("browser-frame");var urlInput = document.getElementById("url-input");var startPage = document.getElementById("start-page");urlInput.value = "";function navigate() {    var url = urlInput.value.trim();    if (!url) return;    if (url.indexOf("://") === -1) url = "https://" + url;    urlInput.value = url;    goTo(url);}function goTo(url) {    if (!url) return;    startPage.style.display = "none";    frame.style.display = "block";    frame.src = url;}function onUrlKey(e) {    if (e.keyCode === 13) navigate();}</script></body></html>
