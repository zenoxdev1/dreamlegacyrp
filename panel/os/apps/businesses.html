<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Businesses</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }:root {    --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4; --mint: #34d399;    --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12);    --text: #e2e8f0; --muted: #64748b; --dim: #475569; --red: #ef4444; --green: #22c55e;}body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; padding: 0; margin: 0; }.app-header { display: flex; align-items: center; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 8px; position: sticky; top: 0; z-index: 10; }.app-header .ah-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; flex: 1; }.app-body { overflow-y: auto; padding: 8px 12px; height: calc(100vh - 40px); }.business-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }.b-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; color: #fff; }.b-type { font-size: 12px; color: var(--cyan); margin: 2px 0 4px; text-transform: uppercase; letter-spacing: 1px; }.b-profit { font-size: 13px; color: var(--mint); margin-bottom: 4px; }.b-profit span { color: var(--muted); }.b-status { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 12px; color: var(--green); background: rgba(34,197,94,0.1); padding: 2px 10px; border-radius: 20px; display: inline-block; }.empty-state { text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; }.empty-state .empty-icon { font-size: 40px; display: block; margin-bottom: 10px; }</style></head><body><div class="app-header">    <span class="ah-title">&#127981; Businesses</span></div><div class="app-body">    <div id="business-list"></div></div><script>
var bridge = (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;function render() {    var ud = bridge.getUD();    if (!ud) return;    var businesses = ud.businesses || [];    var list = document.getElementById("business-list");    list.innerHTML = "";    if (businesses.length === 0) {        list.innerHTML = '<div class="empty-state"><span class="empty-icon">&#127981;</span>You don\'t own any businesses yet.</div>';        return;    }    for (var i = 0; i < businesses.length; i++) {        var b = businesses[i];        var card = document.createElement("div");        card.className = "business-card";        var profitHtml = "";        if (b.profit !== undefined) {            profitHtml = '<div class="b-profit">$' + formatNum(b.profit) + ' <span>/ hr</span></div>';        }        card.innerHTML = '<div class="b-name">' + bridge.esc(b.name) + '</div><div class="b-type">' + bridge.esc(b.type || "Business") + '</div>' + profitHtml + '<div><span class="b-status">&#9679; Operational</span></div>';        list.appendChild(card);    }}function formatNum(n) {    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");}render();</script></body></html>
