<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title data-i18n="shop.title">DLRP | Phone Shop</title>
<link rel="icon" href="assets/img/dlrp.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="glow"></div><div class="glow glow2"></div>

<div class="topbar">
    <a class="brand" href="index.html">
        <span class="brand-badge">DLRP</span>
        <span class="brand-title">Dream Legacy RP</span>
    </a>
    <div class="nav-links">
        <a href="index.html" data-i18n="nav.panel">Panel</a>
        <a href="shop.html" class="active" data-i18n="nav.phoneShop">Phone Shop</a>
        <a href="dreamos.html" data-i18n="nav.dreamOs">DreamOS</a>
    </div>
    <div class="top-right-group">
        <div class="lang-switch" id="lang-switch">
            <button type="button" class="lang-switch-btn" id="lang-switch-btn" aria-haspopup="listbox" aria-expanded="false">
                <span id="lang-switch-current">EN</span>
                <span class="lang-switch-arrow">&#9662;</span>
            </button>
            <ul class="lang-switch-menu hidden" id="lang-switch-menu" role="listbox">
                <li role="option" data-lang="en">English</li>
                <li role="option" data-lang="fr">Fran&ccedil;ais</li>
                <li role="option" data-lang="pt">Portugu&ecirc;s</li>
            </ul>
        </div>
        <a href="https://dreamlegacyrp.xyz" id="nav-login-link" class="btn small hidden" data-i18n="nav.login">Log in</a>
        <div class="nav-user-menu">
            <button type="button" class="nav-user-chip hidden" id="nav-user-chip" aria-haspopup="menu" aria-expanded="false">
                <img id="nav-user-avatar" src="" alt="">
                <span id="nav-user-name">-</span>
                <span class="lang-switch-arrow">&#9662;</span>
            </button>
            <ul class="nav-user-dropdown hidden" id="nav-user-dropdown" role="menu">
                <li role="menuitem" onclick="navLogout();" data-i18n="panel.logOut">Log Out</li>
            </ul>
        </div>
    </div>
</div>

<div class="main-wrap">
    <div class="shop-header">
        <h1 data-i18n="shop.heading">&#128241; Phone Shop</h1>
        <p class="sub" data-i18n="shop.sub">Choose your device. Each model has its own look, wallpaper, and startup animation.</p>
    </div>
    <div id="model-list" class="models"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/i18n.js" defer></script>
<script src="assets/js/supabase-client.js" defer></script>
<script src="assets/js/session.js" defer></script>
<script src="assets/js/nav.js" defer></script>
<script defer>
var phoneModels = [
    { id: "iglitch", name: "iGlitch X", shape: "notch", price: 599, desc: "The iconic notch. Face ID, OLED display." },
    { id: "samsung", name: "Samsung Dream S24", shape: "punchhole", price: 799, desc: "Punch-hole camera, Dynamic AMOLED." },
    { id: "pixel", name: "Pixel Play 8", shape: "pill", price: 699, desc: "Pill-shaped cutout, pure Android." },
    { id: "oneplus", name: "OnePlus Dark", shape: "teardrop", price: 649, desc: "Teardrop notch, smooth 120Hz." },
    { id: "huawei", name: "Huawei Star", shape: "none", price: 549, desc: "Waterfall edge display, no bezels." },
    { id: "sony", name: "Sony Xperia Pro", shape: "none", price: 899, desc: "Square edges, professional grade." }
];

var shapeMarkup = {
    notch: '<div class="phone-notch"></div>',
    punchhole: '<div class="phone-punchhole"></div>',
    pill: '<div class="phone-pill"></div>',
    teardrop: '<div class="phone-teardrop"></div>',
    none: ""
};

function renderShop() {
    var container = document.getElementById("model-list");
    container.innerHTML = phoneModels.map(function(m) {
        var href = "model.html?id=" + m.id;
        return '<div class="model-card" onclick="location.href=\'' + href + '\'">'
            + '<div class="phone-preview">' + shapeMarkup[m.shape] + '<div class="phone-screen">' + m.name + '</div></div>'
            + '<div class="model-name">' + m.name + '</div>'
            + '<div class="model-desc">' + m.desc + '</div>'
            + '<div class="model-price">$' + m.price + '</div>'
            + '<a href="' + href + '" class="btn primary small" style="display:inline-block;text-decoration:none;" data-i18n="shop.view">View</a>'
            + '</div>';
    }).join("");
}

function checkOwnedPhone() {
    var key = getSessionKey();
    if (!key) return;
    api("/api/profile/" + encodeURIComponent(key), "GET").then(function(profile) {
        if (profile.phoneOwned) {
            var banner = document.createElement("div");
            banner.className = "card reveal";
            banner.style.cssText = "max-width:640px;margin:0 auto 24px;text-align:center;";
            banner.innerHTML = '<div class="card-inner">' +
                '<p style="margin-bottom:12px;" data-i18n="shop.alreadyOwn">You already own a phone. Sell it (Settings app in DreamOS) before buying another.</p>' +
                '<a href="dreamos.html" class="btn primary" style="display:inline-block;text-decoration:none;" data-i18n="shop.openDreamOs">Open DreamOS</a>' +
                '</div>';
            document.querySelector(".shop-header").after(banner);
        }
    }).catch(function() {});
}

renderShop();
checkOwnedPhone();

var shopToken = getSessionKey();
if (shopToken) {
    api("/api/profile/" + encodeURIComponent(shopToken), "GET").then(function (profile) {
        if (profile.phoneOwned) {
            var banner = document.createElement("div");
            banner.className = "card reveal";
            banner.style.marginBottom = "24px";
            banner.style.textAlign = "center";
            banner.innerHTML = '<div class="card-inner">' +
                '<p style="margin-bottom:12px;" data-i18n="shop.alreadyOwnBanner">You already own a phone. Buying another one isn\'t available yet.</p>' +
                '<a href="dreamos.html" class="btn primary" style="display:inline-block;text-decoration:none;" data-i18n="shop.openDreamOs">Open DreamOS</a>' +
                '</div>';
            document.querySelector(".shop-header").after(banner);
        }
    }).catch(function () {});
}
</script>
</body>
</html>
