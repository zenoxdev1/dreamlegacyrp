<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title id="page-title">DLRP | Phone Shop</title>
<link rel="icon" href="assets/img/dlrp.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="glow"></div><div class="glow glow2"></div>

<div class="topbar">
    <a class="brand" href="index.html">
        <span class="brand-badge">DLRP</span>
        <span class="brand-title">Dream Legacy RP</span>
    </a>
    <div class="nav-links">
        <a href="index.html" data-i18n="nav.panel">Panel</a>
        <a href="shop.html" data-i18n="nav.phoneShop">Phone Shop</a>
        <a href="dreamos.html" data-i18n="nav.dreamOs">DreamOS</a>
    </div>
    <div class="top-right-group">
        <div class="lang-switch" id="lang-switch">
            <button type="button" class="lang-switch-btn" id="lang-switch-btn" aria-haspopup="listbox" aria-expanded="false">
                <span id="lang-switch-current">EN</span>
                <span class="lang-switch-arrow">&#9662;</span>
            </button>
            <ul class="lang-switch-menu hidden" id="lang-switch-menu" role="listbox">
                <li role="option" data-lang="en">English</li>
                <li role="option" data-lang="fr">Fran&ccedil;ais</li>
                <li role="option" data-lang="pt">Portugu&ecirc;s</li>
            </ul>
        </div>
        <a href="https://dreamlegacyrp.xyz" id="nav-login-link" class="btn small hidden" data-i18n="nav.login">Log in</a>
        <div class="nav-user-menu">
            <button type="button" class="nav-user-chip hidden" id="nav-user-chip" aria-haspopup="menu" aria-expanded="false">
                <img id="nav-user-avatar" src="" alt="">
                <span id="nav-user-name">-</span>
                <span class="lang-switch-arrow">&#9662;</span>
            </button>
            <ul class="nav-user-dropdown hidden" id="nav-user-dropdown" role="menu">
                <li role="menuitem" onclick="navLogout();" data-i18n="panel.logOut">Log Out</li>
            </ul>
        </div>
    </div>
</div>

<div class="main-wrap">
    <div id="model-content" class="model-page-wrap"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/i18n.js" defer></script>
<script src="assets/js/supabase-client.js" defer></script>
<script src="assets/js/session.js" defer></script>
<script src="assets/js/nav.js" defer></script>
<script defer>
var PHONE_CATALOG = {
    iglitch: {
        name: "iGlitch X", price: 599, shape: "notch",
        desc: "The iconic notch returns with an all-new OLED display. Face ID, premium build, and the ecosystem that started it all.",
        specs: { ram: "6GB", storage: "128GB", camera: "12MP", display: "6.1\" OLED", battery: "3,200mAh", color: "Deep Violet", colorHex: "#8aa8ff" }
    },
    samsung: {
        name: "Samsung Dream S24", price: 799, shape: "punchhole",
        desc: "Punch-hole camera with an immersive Dynamic AMOLED display. Built for productivity with the legendary S Pen support.",
        specs: { ram: "8GB", storage: "256GB", camera: "108MP", display: "6.8\" AMOLED", battery: "5,000mAh", color: "Slate Navy", colorHex: "#8a9ac0" }
    },
    pixel: {
        name: "Pixel Play 8", price: 699, shape: "pill",
        desc: "The pill-shaped cutout houses advanced sensors. Pure Android with AI-powered camera magic and smooth LTPO display.",
        specs: { ram: "8GB", storage: "128GB", camera: "50MP", display: "6.3\" LTPO", battery: "4,500mAh", color: "Obsidian Black", colorHex: "#6b8cae" }
    },
    oneplus: {
        name: "OnePlus Dark", price: 649, shape: "teardrop",
        desc: "Teardrop notch design with a blazing 120Hz Fluid Display. Top-tier performance with 12GB RAM and Warp Charge.",
        specs: { ram: "12GB", storage: "256GB", camera: "48MP", display: "6.7\" 120Hz", battery: "4,800mAh", color: "Midnight Shadow", colorHex: "#8a9ada" }
    },
    huawei: {
        name: "Huawei Star", price: 549, shape: "none",
        desc: "Waterfall edge display that curves seamlessly into the frame. No bezels, pure immersion with Leica-engineered optics.",
        specs: { ram: "6GB", storage: "128GB", camera: "40MP", display: "6.5\" OLED", battery: "4,200mAh", color: "Starlight Blue", colorHex: "#7a9aea" }
    },
    sony: {
        name: "Sony Xperia Pro", price: 899, shape: "none",
        desc: "Flat square-edge design with a professional-grade 4K HDR display. Built for creators who demand precision and durability.",
        specs: { ram: "12GB", storage: "512GB", camera: "48MP", display: "6.5\" 4K HDR", battery: "4,500mAh", color: "Deep Violet", colorHex: "#8aa8ff" }
    }
};

var shapeMarkup = {
    notch: '<div class="phone-notch"><div class="speaker"></div><div class="cam"></div></div>',
    punchhole: '<div class="phone-punchhole"></div>',
    pill: '<div class="phone-pill"></div>',
    teardrop: '<div class="phone-teardrop"></div>',
    none: ""
};

function getSessionToken() { return getSessionKey(); }

function renderModelPage() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get("id") || "iglitch";
    var m = PHONE_CATALOG[id];
    if (!m) { id = "iglitch"; m = PHONE_CATALOG[id]; }

    document.getElementById("page-title").textContent = "DLRP | " + m.name;

    document.getElementById("model-content").innerHTML =
        '<div class="phone-section">' +
            '<div class="phone-flipper" id="phoneFlipper" onclick="flipPhone()">' +
                '<div class="phone-front"><div class="phone-wrapper">' + shapeMarkup[m.shape] +
                    '<div class="phone-screen-bg"><span class="model-label">' + m.name + '</span></div>' +
                    '<div class="phone-bottom-bar"></div>' +
                '</div></div>' +
                '<div class="phone-back"><div class="phone-wrapper"><div class="phone-back-glass">' +
                    '<div class="phone-back-camera"><div class="cam-ring"></div><div class="cam-ring"></div><div class="cam-ring"></div></div>' +
                    '<div class="phone-back-logo">DLRP</div>' +
                    '<div class="phone-back-text">' + m.name + '</div>' +
                '</div></div></div>' +
            '</div>' +
            '<div class="phone-flip-hint" data-i18n="shop.flip">&#8645; Flip Phone</div>' +
        '</div>' +
        '<div class="info-section">' +
            '<a href="shop.html" class="back-link"><span>&larr;</span> <span data-i18n="shop.backToShop">Back to Shop</span></a>' +
            '<div class="model-page-title">' + m.name + '</div>' +
            '<div class="model-page-desc">' + m.desc + '</div>' +
            '<div class="model-page-price">$' + m.price + '</div>' +
            '<div class="specs">' +
                '<div class="spec-item"><div class="label" data-i18n="shop.specRam">RAM</div><div class="value">' + m.specs.ram + '</div></div>' +
                '<div class="spec-item"><div class="label" data-i18n="shop.specStorage">Storage</div><div class="value">' + m.specs.storage + '</div></div>' +
                '<div class="spec-item"><div class="label" data-i18n="shop.specCamera">Camera</div><div class="value">' + m.specs.camera + '</div></div>' +
                '<div class="spec-item"><div class="label" data-i18n="shop.specDisplay">Display</div><div class="value">' + m.specs.display + '</div></div>' +
                '<div class="spec-item"><div class="label" data-i18n="shop.specBattery">Battery</div><div class="value">' + m.specs.battery + '</div></div>' +
                '<div class="spec-item"><div class="label" data-i18n="shop.specColor">Color</div><div class="value" style="color:' + m.specs.colorHex + ';">' + m.specs.color + '</div></div>' +
            '</div>' +
            '<div class="card"><div class="card-inner" id="buy-form">' +
                '<div style="font-family:\'Rajdhani\',sans-serif;font-size:18px;font-weight:700;margin-bottom:12px;" data-i18n="shop.buyNow">Buy Now</div>' +
                '<p style="color:var(--muted);font-size:13px;margin-bottom:10px;" data-i18n="shop.buyingAs">Buying as your logged-in Discord account.</p>' +
                '<div class="form-error" id="buy-error"></div>' +
                '<div class="actions"><button class="btn primary" onclick="buyPhone(\'' + id + '\')" style="flex:1;" data-i18n="shop.purchase">Purchase</button></div>' +
            '</div></div>' +
        '</div>';

    if (window.DLRP_I18N && DLRP_I18N.getLang) applyStaticTranslations();
}

function applyStaticTranslations() {
    // Reaplica las traducciones a los nodos que acabamos de insertar
    // (el motor normal solo corre en DOMContentLoaded/cambio de idioma).
    var event = new Event("dlrp-retranslate");
    document.dispatchEvent(event);
    if (window.DLRP_I18N) DLRP_I18N.setLang(DLRP_I18N.getLang());
}

function buyPhone(id) {
    var m = PHONE_CATALOG[id];
    var token = getSessionKey();
    if (!token) { showError(DLRP_I18N ? DLRP_I18N.t("shop.loginFirst", "Log in from the Panel first.") : "Log in from the Panel first."); return; }
    showError("");

    api("/api/phone/buy", "POST", { key: token, model: m.name, price: m.price }).then(function (profile) {
        document.getElementById("buy-form").innerHTML =
            '<div class="purchase-complete">' +
                '<div class="pc-icon">&#9989;</div>' +
                '<div class="pc-title" data-i18n="shop.complete">Purchase Complete!</div>' +
                '<div class="pc-detail">' + m.name + '<br>' + (DLRP_I18N ? DLRP_I18N.t("shop.number", "Number") : "Number") + ': ' + profile.phoneNumber + '</div>' +
                '<a href="dreamos.html" class="btn primary" style="display:inline-block;margin-top:16px;text-decoration:none;" data-i18n="shop.openDreamOs">Open DreamOS</a>' +
            '</div>';
    }).catch(function (err) {
        showError(err.message || "Purchase failed.");
    });
}

function showError(msg) {
    var el = document.getElementById("buy-error");
    if (el) { el.textContent = msg; el.style.display = msg ? "block" : "none"; }
}

function flipPhone() {
    document.getElementById("phoneFlipper").classList.toggle("flipped");
}

renderModelPage();
</script>
</body>
</html>
