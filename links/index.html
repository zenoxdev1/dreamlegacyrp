<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #090a0d;
    --surface: rgba(18, 22, 29, 0.78);
    --line: rgba(255, 255, 255, 0.10);
    --line-strong: rgba(120, 168, 255, 0.35);
    --text: #f4f7fb;
    --muted: #aab3c2;
    --blue: #2f73ff;
    --blue-dark: #1746a8;
    --discord: #5865f2;
    --radius: 14px;
}
body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
}
.glow {
    position: fixed;
    top: -300px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(47, 115, 255, .16) 0%, transparent 70%);
    pointer-events: none;
}
.wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; text-align: center; }
.badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 16px;
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    font-family: "Rajdhani", sans-serif; font-weight: 800; font-size: 20px; color: #fff;
    margin-bottom: 18px; letter-spacing: .02em;
}
h1 {
    font-family: "Rajdhani", sans-serif; font-size: 30px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .02em; margin-bottom: 6px;
}
p.sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
.links { display: grid; gap: 12px; }
.link-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--surface);
    color: var(--text); text-decoration: none; font-weight: 700;
    font-size: 15px; transition: transform .18s, border-color .18s, box-shadow .18s;
    backdrop-filter: blur(10px);
}
.link-btn:hover { transform: translateY(-2px); border-color: var(--line-strong); box-shadow: 0 12px 32px rgba(0,0,0,.3); }
.link-btn.primary { background: linear-gradient(135deg, var(--discord), #4650c9); border: none; }
.link-icon { width: 22px; height: 22px; flex-shrink: 0; }
footer { margin-top: 36px; color: var(--muted); font-size: 12px; }
footer a { color: var(--muted); }
</style>
