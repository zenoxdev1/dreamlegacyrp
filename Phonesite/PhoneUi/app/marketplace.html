<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Marketplace</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }:root {    --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4; --mint: #34d399;    --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12);    --text: #e2e8f0; --muted: #64748b; --dim: #475569; --red: #ef4444; --green: #22c55e;}body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; padding: 0; margin: 0; }.app-header { display: flex; align-items: center; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 8px; position: sticky; top: 0; z-index: 10; }.app-header .ah-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; flex: 1; }.app-body { overflow-y: auto; padding: 8px 12px; height: calc(100vh - 40px); }.item-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--card-border); }.item-icon { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }.item-info { flex: 1; min-width: 0; }.item-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; color: #fff; }.item-desc { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }.item-qty { font-size: 12px; color: var(--dim); margin-top: 2px; }.item-sell { flex-shrink: 0; }.btn-sell { padding: 6px 14px; border-radius: 6px; border: none; font-size: 12px; font-family: 'Rajdhani', sans-serif; font-weight: 600; cursor: pointer; transition: all .1s; background: linear-gradient(135deg,var(--purple),var(--purple-dark)); color: #fff; }.btn-sell:hover { opacity: .9; }.btn-sell:active { transform: scale(.96); }.empty-state { text-align: center; padding: 48px 0; color: var(--muted); font-size: 13px; }.empty-state .empty-icon { font-size: 40px; display: block; margin-bottom: 10px; }.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 999; align-items: center; justify-content: center; padding: 20px; }.modal-overlay.active { display: flex; }.modal-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; width: 100%; max-width: 320px; padding: 20px; }.modal-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 14px; }.modal-body { margin-bottom: 16px; }.modal-body label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }.modal-body input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid rgba(124,58,237,0.15); background: rgba(255,255,255,.05); color: var(--text); font-size: 14px; font-family: inherit; outline: none; margin-bottom: 10px; }.modal-body input:focus { border-color: var(--purple); }.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }.modal-footer button { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-family: 'Rajdhani', sans-serif; font-weight: 600; cursor: pointer; transition: all .1s; }.modal-footer .btn-cancel { background: rgba(255,255,255,.06); color: var(--muted); }.modal-footer .btn-cancel:hover { background: rgba(255,255,255,.1); }.modal-footer .btn-confirm { background: linear-gradient(135deg,var(--purple),var(--purple-dark)); color: #fff; }.modal-footer .btn-confirm:hover { opacity: .9; }.modal-error { color: var(--red); font-size: 12px; margin-top: -6px; margin-bottom: 8px; display: none; }</style></head><body><div class="app-header">    <span class="ah-title">&#128722; Marketplace</span></div><div class="app-body">    <div id="marketplace-list"></div></div><div class="modal-overlay" id="modal-overlay">    <div class="modal-box">        <div class="modal-title" id="modal-title">Sell Item</div>        <div class="modal-body" id="modal-body"></div>        <div class="modal-error" id="modal-error"></div>        <div class="modal-footer" id="modal-footer"></div>    </div></div><script>
var bridge = (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;var sellingIndex = -1;function render() {    var ud = bridge.getUD();    if (!ud) return;    var items = ud.inventory || [];    var list = document.getElementById("marketplace-list");    list.innerHTML = "";    if (items.length === 0) {        list.innerHTML = '<div class="empty-state"><span class="empty-icon">&#128230;</span>Your inventory is empty.</div>';        return;    }    for (var i = 0; i < items.length; i++) {        var item = items[i];        var row = document.createElement("div");        row.className = "item-row";        var icon = item.icon || "&#128230;";        var name = item.name || "Item";        var desc = item.desc || item.description || "";        var qty = item.qty || 1;        row.innerHTML = '<div class="item-icon">' + icon + '</div><div class="item-info"><div class="item-name">' + bridge.esc(name) + '</div><div class="item-desc">' + bridge.esc(desc) + '</div><div class="item-qty">Qty: ' + qty + '</div></div><div class="item-sell"><button class="btn-sell" onclick="openSell(' + i + ')">Sell</button></div>';        list.appendChild(row);    }}function openSell(index) {    sellingIndex = index;    var ud = bridge.getUD();    if (!ud) return;    var item = (ud.inventory || [])[index];    if (!item) return;    var qty = item.qty || 1;    document.getElementById("modal-title").textContent = "Sell " + item.name;    document.getElementById("modal-body").innerHTML = ' <label for="sell-price">Price per unit ($)</label><input type="number" id="sell-price" placeholder="0" min="1"><label for="sell-qty">Quantity (max ' + qty + ')</label><input type="number" id="sell-qty" placeholder="' + qty + '" min="1" max="' + qty + '">';    document.getElementById("modal-error").style.display = "none";    document.getElementById("modal-error").textContent = "";    var footer = document.getElementById("modal-footer");    footer.innerHTML = '<button class="btn-cancel" onclick="closeSell()">Cancel</button><button class="btn-confirm" onclick="confirmSell()">List</button>';    document.getElementById("modal-overlay").classList.add("active");    setTimeout(function() {        var inp = document.getElementById("sell-price");        if (inp) inp.focus();    }, 100);}function closeSell() {    document.getElementById("modal-overlay").classList.remove("active");    sellingIndex = -1;}function confirmSell() {    var ud = bridge.getUD();    if (!ud) return;    var items = ud.inventory || [];    var item = items[sellingIndex];    if (!item) return;    var priceInput = document.getElementById("sell-price");    var qtyInput = document.getElementById("sell-qty");    var price = parseInt(priceInput.value, 10);    var qty = parseInt(qtyInput.value, 10);    var maxQty = item.qty || 1;    if (!price || price <= 0) {        showSellError("Enter a valid price.");        return;    }    if (!qty || qty <= 0 || qty > maxQty) {        showSellError("Enter a valid quantity (1-" + maxQty + ").");        return;    }    var total = price * qty;    ud.cash = (ud.cash || 0) + total;    if (qty >= maxQty) {        items.splice(sellingIndex, 1);    } else {        item.qty = maxQty - qty;    }    bridge.saveData();    bridge.updateHUD();    bridge.notif("Item Sold", "Sold " + qty + "x " + item.name + " for $" + formatNum(total) + ".");    closeSell();    render();}function showSellError(msg) {    var el = document.getElementById("modal-error");    el.textContent = msg;    el.style.display = "block";}function formatNum(n) {    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");}render();</script></body></html>
