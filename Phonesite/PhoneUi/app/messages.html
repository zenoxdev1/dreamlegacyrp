<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Messages</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }:root {    --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4; --mint: #34d399;    --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12);    --text: #e2e8f0; --muted: #64748b; --dim: #475569; --red: #ef4444;}body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; padding: 0; margin: 0; }.app-header { display: flex; align-items: center; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 8px; }.app-header .ah-back { background: none; border: none; color: var(--purple); font-size: 18px; cursor: pointer; padding: 2px 4px; }.app-header .ah-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; flex: 1; }.app-body { overflow-y: auto; padding: 8px 12px; height: calc(100vh - 40px); }.msg-contact { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; }.msg-contact:active { opacity: .6; }.mc-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,var(--purple),var(--cyan)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }.mc-info { flex: 1; min-width: 0; }.mc-name { font-size: 14px; font-weight: 500; }.mc-num { font-size: 11px; color: var(--dim); }.mc-preview { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }.msg-thread { display: flex; flex-direction: column; height: calc(100vh - 40px); }.msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 4px 0; }.msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 12px; line-height: 1.4; }.msg-bubble.incoming { align-self: flex-start; background: rgba(255,255,255,.06); border-bottom-left-radius: 4px; }.msg-bubble.outgoing { align-self: flex-end; background: linear-gradient(135deg,var(--purple),var(--purple-dark)); border-bottom-right-radius: 4px; }.msg-bubble .msg-time { font-size: 9px; color: var(--dim); margin-top: 4px; text-align: right; }.msg-input-bar { display: flex; gap: 6px; padding: 8px 0; align-items: center; }.msg-input-bar input { flex: 1; padding: 10px 12px; border-radius: 20px; border: 1px solid var(--card-border); background: rgba(255,255,255,.05); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }.msg-input-bar input:focus { border-color: var(--purple); }.msg-input-bar button { padding: 8px 16px; border-radius: 20px; border: none; background: linear-gradient(135deg,var(--purple),var(--purple-dark)); color: #fff; font-size: 13px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; }.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }.empty-state .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: .4; }.hidden { display: none !important; }</style></head><body><div id="contacts-view">    <div class="app-header">        <span class="ah-title">&#9993; Messages</span>    </div>    <div class="app-body" id="contact-list"></div></div><div id="thread-view" class="hidden">    <div class="app-header">        <button class="ah-back" onclick="backToList()">&larr;</button>        <span class="ah-title" id="thread-title">Contact</span>    </div>    <div class="msg-thread">        <div class="msg-list" id="msg-list"></div>        <div class="msg-input-bar">            <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="onInputKey(event)">            <button onclick="sendMessage()">Send</button>        </div>    </div></div><script>
var bridge = (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;var currentContact = null;function getStore() {    var s = bridge.msgGetStore();    if (!s || typeof s !== "object") s = {};    return s;}function saveStore(s) {    bridge.msgSetStore(s);}function getMyMessages() {    var user = bridge.currentUser();    var store = getStore();    if (!store[user]) store[user] = {};    return store[user];}function saveMyMessages(obj) {    var user = bridge.currentUser();    var store = getStore();    store[user] = obj;    saveStore(store);}function renderContacts() {    var ud = bridge.getUD();    var list = document.getElementById("contact-list");    var myMsgs = getMyMessages();    var contacts = [];    if (ud && ud.contacts) {        for (var i = 0; i < ud.contacts.length; i++) contacts.push(ud.contacts[i]);    }    if (contacts.length === 0) {        list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9993;</div>No contacts to message.</div>';        return;    }    var html = "";    var gradients = ["linear-gradient(135deg,#3b82f6,#1d4ed8)","linear-gradient(135deg,#22c55e,#16a34a)","linear-gradient(135deg,#8b5cf6,#6d28d9)","linear-gradient(135deg,#f59e0b,#d97706)","linear-gradient(135deg,#ec4899,#db2777)","linear-gradient(135deg,#14b8a6,#0d9488)","linear-gradient(135deg,#f97316,#ea580c)","linear-gradient(135deg,#a855f7,#7e22ce)"];    for (var j = 0; j < contacts.length; j++) {        var c = contacts[j];        var letter = c.name ? c.name.charAt(0).toUpperCase() : "?";        var grad = gradients[j % gradients.length];        var msgs = myMsgs[c.name];        var preview = "";        if (msgs && msgs.length > 0) {            var last = msgs[msgs.length - 1];            preview = bridge.esc(last.text);            if (preview.length > 30) preview = preview.substring(0, 30) + "...";        }        html += '<div class="msg-contact" onclick="openThread(\'' + bridge.esc(c.name) + '\')">'            + '<div class="mc-avatar" style="background:' + grad + ';">' + bridge.esc(letter) + '</div>'            + '<div class="mc-info"><div class="mc-name">' + bridge.esc(c.name) + '</div><div class="mc-num">' + bridge.esc(c.number) + '</div>'            + (preview ? '<div class="mc-preview">' + preview + '</div>' : '')            + '</div></div>';    }    list.innerHTML = html;}function openThread(contactName) {    currentContact = contactName;    document.getElementById("contacts-view").classList.add("hidden");    document.getElementById("thread-view").classList.remove("hidden");    document.getElementById("thread-title").textContent = contactName;    renderMessages();    document.getElementById("msg-input").value = "";    document.getElementById("msg-input").focus();}function backToList() {    currentContact = null;    document.getElementById("thread-view").classList.add("hidden");    document.getElementById("contacts-view").classList.remove("hidden");    renderContacts();}function getThreadMessages() {    if (!currentContact) return [];    var myMsgs = getMyMessages();    return myMsgs[currentContact] || [];}function renderMessages() {    var list = document.getElementById("msg-list");    var msgs = getThreadMessages();    if (msgs.length === 0) {        list.innerHTML = '<div class="empty-state" style="padding:20px 10px;"><div class="empty-icon">&#9993;</div>No messages yet.</div>';        return;    }    var html = "";    var user = bridge.currentUser();    for (var i = 0; i < msgs.length; i++) {        var m = msgs[i];        var isOut = m.from === user;        html += '<div class="msg-bubble ' + (isOut ? "outgoing" : "incoming") + '">'            + bridge.esc(m.text)            + '<div class="msg-time">' + bridge.esc(m.time) + '</div>'            + '</div>';    }    list.innerHTML = html;    list.scrollTop = list.scrollHeight;}function sendMessage() {    var input = document.getElementById("msg-input");    var text = input.value.trim();    if (!text || !currentContact) return;    var user = bridge.currentUser();    var now = new Date();    var time = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");    var myMsgs = getMyMessages();    if (!myMsgs[currentContact]) myMsgs[currentContact] = [];    myMsgs[currentContact].push({ from: user, to: currentContact, text: text, time: time });    saveMyMessages(myMsgs);    input.value = "";    renderMessages();}function onInputKey(e) {    if (e.keyCode === 13) sendMessage();}renderContacts();</script></body></html>
