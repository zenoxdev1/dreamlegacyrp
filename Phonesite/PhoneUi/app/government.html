<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Government</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }:root {    --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4; --mint: #34d399;    --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12);    --text: #e2e8f0; --muted: #64748b; --dim: #475569; --red: #ef4444; --green: #22c55e;}body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; padding: 0; margin: 0; }.app-header { display: flex; align-items: center; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 8px; position: sticky; top: 0; z-index: 10; }.app-header .ah-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; flex: 1; }.app-body { overflow-y: auto; padding: 8px 12px; height: calc(100vh - 40px); }.id-card { background: var(--card); border: 2px solid transparent; border-radius: 16px; padding: 24px 20px; margin: 16px 0; text-align: center; position: relative; overflow: hidden; background-clip: padding-box; }.id-card::before { content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border-radius: 16px; background: linear-gradient(135deg, var(--purple), var(--cyan), var(--purple-dark)); z-index: -1; }.id-card-inner { position: relative; z-index: 1; }.id-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, var(--purple), var(--purple-dark)); display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 32px; color: #fff; margin: 0 auto 10px; overflow: hidden; }.id-avatar img { width: 100%; height: 100%; object-fit: cover; }.id-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; color: #fff; margin-bottom: 8px; }.id-detail { font-size: 13px; color: var(--muted); margin-bottom: 3px; }.id-detail span { color: var(--text); }.id-badge { display: inline-block; margin-top: 12px; padding: 4px 16px; border-radius: 20px; background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(124,58,237,0.15)); border: 1px solid rgba(6,182,212,0.3); font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 12px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }.no-id-area { text-align: center; padding: 48px 0; }.no-id-icon { font-size: 56px; display: block; margin-bottom: 14px; }.no-id-text { font-size: 14px; color: var(--muted); margin-bottom: 20px; }.btn-primary { padding: 12px 28px; border-radius: 10px; border: none; font-size: 14px; font-family: 'Rajdhani', sans-serif; font-weight: 600; cursor: pointer; transition: all .1s; background: linear-gradient(135deg,var(--purple),var(--purple-dark)); color: #fff; }.btn-primary:hover { opacity: .9; }.btn-primary:active { transform: scale(.96); }.btn-secondary { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-family: 'Rajdhani', sans-serif; font-weight: 600; cursor: pointer; transition: all .1s; background: rgba(255,255,255,.06); color: var(--muted); }.btn-secondary:hover { background: rgba(255,255,255,.1); }.form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 999; align-items: center; justify-content: center; padding: 20px; }.form-overlay.active { display: flex; }.form-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; width: 100%; max-width: 340px; padding: 24px 20px; max-height: 90vh; overflow-y: auto; }.form-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; text-align: center; margin-bottom: 18px; color: #fff; }.form-group { margin-bottom: 14px; }.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }.form-group input, .form-group select { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid rgba(124,58,237,0.15); background: rgba(255,255,255,.05); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }.form-group input:focus, .form-group select:focus { border-color: var(--purple); }.form-group select { appearance: none; cursor: pointer; }.form-group select option { background: var(--card); color: var(--text); }.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }.form-error { color: var(--red); font-size: 12px; text-align: center; margin-bottom: 10px; display: none; }</style></head><body><div class="app-header">    <span class="ah-title">&#127987; Government</span></div><div class="app-body">    <div id="government-content"></div></div><div class="form-overlay" id="form-overlay">    <div class="form-box">        <div class="form-title">&#127912; Citizen ID Application</div>        <div class="form-error" id="form-error"></div>        <div class="form-group">            <label for="id-fullname">Full Name</label>            <input type="text" id="id-fullname" placeholder="John Doe" maxlength="60">        </div>        <div class="form-group">            <label for="id-dob">Date of Birth</label>            <input type="text" id="id-dob" placeholder="DD/MM/YYYY" maxlength="10">        </div>        <div class="form-group">            <label for="id-pob">Place of Birth</label>            <input type="text" id="id-pob" placeholder="City, State" maxlength="60">        </div>        <div class="form-group">            <label for="id-gender">Gender</label>            <select id="id-gender">                <option value="Male">Male</option>                <option value="Female">Female</option>                <option value="Non-Binary">Non-Binary</option>            </select>        </div>        <div class="form-actions">            <button class="btn-secondary" onclick="closeForm()">Cancel</button>            <button class="btn-primary" onclick="submitID()">Submit</button>        </div>    </div></div><script>
var bridge = (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;function render() {    var ud = bridge.getUD();    if (!ud) return;    var container = document.getElementById("government-content");    container.innerHTML = "";    var idInfo = ud.idInfo;    if (!idInfo || !idInfo.idNum) {        showNoID(container, ud);    } else {        showIDCard(container, ud, idInfo);    }}function showNoID(container, ud) {    container.innerHTML = '<div class="no-id-area"><span class="no-id-icon">&#127912;</span><div class="no-id-text">You haven\'t received your Citizen ID yet.</div><button class="btn-primary" onclick="openForm()">Receive ID Card</button></div>';}function openForm() {    document.getElementById("form-overlay").classList.add("active");    document.getElementById("form-error").style.display = "none";    document.getElementById("form-error").textContent = "";    document.getElementById("id-fullname").value = "";    document.getElementById("id-dob").value = "";    document.getElementById("id-pob").value = "";    document.getElementById("id-gender").value = "Male";    setTimeout(function() {        var inp = document.getElementById("id-fullname");        if (inp) inp.focus();    }, 100);}function closeForm() {    document.getElementById("form-overlay").classList.remove("active");}function submitID() {    var fullName = document.getElementById("id-fullname").value.trim();    var dob = document.getElementById("id-dob").value.trim();    var pob = document.getElementById("id-pob").value.trim();    var gender = document.getElementById("id-gender").value;    if (!fullName) {        showFormError("Please enter your full name.");        return;    }    if (!dob) {        showFormError("Please enter your date of birth.");        return;    }    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(dob)) {        showFormError("Date must be in DD/MM/YYYY format.");        return;    }    if (!pob) {        showFormError("Please enter your place of birth.");        return;    }    var ud = bridge.getUD();    if (!ud) return;    ud.displayName = fullName;    ud.idInfo = {        dob: dob,        pob: pob,        gender: gender,        idNum: "SA-" + randomDigits(6)    };    bridge.saveData();    bridge.loadProfile();    bridge.notif("ID Registered", "Welcome, " + bridge.esc(fullName) + "!");    closeForm();    render();}function randomDigits(n) {    var result = "";    for (var i = 0; i < n; i++) {        result += Math.floor(Math.random() * 10);    }    return result;}function showFormError(msg) {    var el = document.getElementById("form-error");    el.textContent = msg;    el.style.display = "block";}function showIDCard(container, ud, idInfo) {    var pfp = ud.pfp || "";    var name = ud.displayName || "Citizen";    var initial = name.charAt(0).toUpperCase();    var avatarHtml;    if (pfp) {        avatarHtml = '<img src="' + bridge.esc(pfp) + '" alt="Avatar">';    } else {        avatarHtml = initial;    }    var dobDisplay = idInfo.dob || "N/A";    var pobDisplay = idInfo.pob || "N/A";    var genderDisplay = idInfo.gender || "N/A";    var idNumDisplay = idInfo.idNum || "SA-000000";    container.innerHTML = '<div class="id-card"><div class="id-card-inner"><div class="id-avatar">' + avatarHtml + '</div><div class="id-name">' + bridge.esc(name) + '</div><div class="id-detail">Date of Birth: <span>' + bridge.esc(dobDisplay) + '</span></div><div class="id-detail">Place of Birth: <span>' + bridge.esc(pobDisplay) + '</span></div><div class="id-detail">Gender: <span>' + bridge.esc(genderDisplay) + '</span></div><div class="id-detail" style="margin-top:6px;font-family:\'Rajdhani\',sans-serif;font-weight:600;font-size:14px;color:var(--cyan);">' + bridge.esc(idNumDisplay) + '</div><div class="id-badge">&#9733; Citizen of San Andreas</div></div></div>';}render();</script></body></html>
