<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Contacts</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"><style>* { box-sizing: border-box; margin: 0; padding: 0; }:root {    --purple: #7c3aed; --purple-dark: #5b21b6; --cyan: #06b6d4; --mint: #34d399;    --bg: #0a0a0f; --card: #13131a; --card-border: rgba(124,58,237,0.12);    --text: #e2e8f0; --muted: #64748b; --dim: #475569; --red: #ef4444;}body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; padding: 0; margin: 0; }.app-header { display: flex; align-items: center; padding: 6px 10px; background: var(--card); border-bottom: 1px solid var(--card-border); gap: 8px; position: sticky; top: 0; z-index: 10; }.app-header .ah-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; flex: 1; }.app-header .ah-add { background: linear-gradient(135deg,var(--purple),var(--purple-dark)); border: none; color: #fff; font-size: 18px; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }.app-body { flex: 1; overflow-y: auto; padding: 8px 12px; height: calc(100vh - 44px); }.contact-entry { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04); }.contact-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }.contact-info { flex: 1; min-width: 0; }.contact-name { font-size: 14px; font-weight: 500; }.contact-num { font-size: 11px; color: var(--dim); }.contact-badge { font-size: 9px; background: var(--red); color: #fff; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }.contact-actions { display: flex; gap: 4px; flex-shrink: 0; }.contact-actions button { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 6px; transition: all .15s; }.contact-actions button:hover { background: rgba(255,255,255,.05); }.contact-actions .ca-call { color: var(--mint); }.contact-actions .ca-msg { color: var(--purple); }.contact-actions .ca-del { color: var(--dim); }.contact-actions .ca-del:hover { color: var(--red); }.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }.empty-state .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: .4; }</style></head><body><div class="app-header">    <span class="ah-title">&#128231; Contacts</span>    <button class="ah-add" onclick="addContact()">+</button></div><div class="app-body" id="contact-list"></div><script>
var bridge = (window.parent && window.parent.dlrpBridge) || window.dlrpBridge;console.log("Contacts bridge:", bridge, "parent:", window.parent, "window.dlrpBridge:", window.dlrpBridge);function render() {    var ud = bridge.getUD();    var list = document.getElementById("contact-list");    if (!ud || !ud.contacts || ud.contacts.length === 0) {        list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128231;</div>No contacts yet.<br>Tap + to add one.</div>';        return;    }    var html = "";    var gradients = ["linear-gradient(135deg,#3b82f6,#1d4ed8)","linear-gradient(135deg,#22c55e,#16a34a)","linear-gradient(135deg,#8b5cf6,#6d28d9)","linear-gradient(135deg,#f59e0b,#d97706)","linear-gradient(135deg,#ec4899,#db2777)","linear-gradient(135deg,#14b8a6,#0d9488)","linear-gradient(135deg,#f97316,#ea580c)","linear-gradient(135deg,#a855f7,#7e22ce)"];    for (var i = 0; i < ud.contacts.length; i++) {        var c = ud.contacts[i];        var letter = c.name ? c.name.charAt(0).toUpperCase() : "?";        var grad = gradients[i % gradients.length];        var badge = c.emergency ? ' <span class="contact-badge">EMERGENCY</span>' : "";        html += '<div class="contact-entry">'            + '<div class="contact-avatar" style="background:' + grad + ';">' + bridge.esc(letter) + '</div>'            + '<div class="contact-info"><div class="contact-name">' + bridge.esc(c.name) + badge + '</div><div class="contact-num">' + bridge.esc(c.number) + '</div></div>'            + '<div class="contact-actions">'            + '<button class="ca-call" onclick="callContact(' + i + ')" title="Call">&#128222;</button>'            + '<button class="ca-msg" onclick="msgContact(' + i + ')" title="Message">&#9993;</button>'            + '<button class="ca-del" onclick="delContact(' + i + ')" title="Delete">&#10005;</button>'            + '</div></div>';    }    list.innerHTML = html;}function addContact() {    bridge.showCustomModal("Add Contact",         '<div class="form-field"><label>Name</label><input type="text" id="cm-name" placeholder="Contact name" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(124,58,237,0.15);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;"></div>'        + '<div class="form-field"><label>Number</label><input type="text" id="cm-number" placeholder="e.g. 555-0101" style="width:100%;padding:11px 14px;border-radius:8px;border:1px solid rgba(124,58,237,0.15);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;"></div>'        + '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;"><input type="checkbox" id="cm-emergency"><label style="color:#64748b;font-size:12px;">Emergency contact</label></div>',        [            { label: "Cancel", "class": "btn", action: function() {} },            { label: "Save", "class": "btn primary", action: function() {                var name = bridge.el("cm-name").value.trim();                var number = bridge.el("cm-number").value.trim();                if (!name || !number) { bridge.notif("Error", "Name and number required."); return; }                var ud = bridge.getUD();                ud.contacts.push({ name: name, number: number, emergency: bridge.el("cm-emergency").checked });                bridge.saveData();                render();            }}        ]    );}function callContact(idx) {    bridge.openApp("dialer");}function msgContact(idx) {    bridge.openApp("messages");}function delContact(idx) {    bridge.showCustomModal("Delete Contact", '<p style="color:#64748b;font-size:13px;">Remove this contact?</p>', [        { label: "Cancel", "class": "btn", action: function() {} },        { label: "Delete", "class": "btn", action: function() {            var ud = bridge.getUD();            ud.contacts.splice(idx, 1);            bridge.saveData();            render();        }}    ]);}render();</script></body></html>
